<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>
  <!-- Mortarboard hat brim -->
  <rect x="24" y="21" width="52" height="7" rx="2" fill="#5B21B6"/>
  <!-- Hat top -->
  <rect x="40" y="13" width="20" height="10" rx="2" fill="#5B21B6"/>
  <!-- Tassel line -->
  <line x1="74" y1="25" x2="80" y2="35" stroke="#4C1D95" stroke-width="2"/>
  <!-- Tassel ball -->
  <circle cx="81" cy="37" r="4" fill="#D4A017"/>
  <!-- Face -->
  <circle cx="50" cy="56" r="26" fill="#EDE9FE"/>
  <!-- Glasses left -->
  <circle cx="41" cy="52" r="8.5" fill="white" stroke="#5B21B6" stroke-width="2"/>
  <!-- Glasses right -->
  <circle cx="59" cy="52" r="8.5" fill="white" stroke="#5B21B6" stroke-width="2"/>
  <!-- Bridge -->
  <line x1="49.5" y1="52" x2="50.5" y2="52" stroke="#5B21B6" stroke-width="2"/>
  <!-- Side arms -->
  <line x1="23" y1="52" x2="32.5" y2="52" stroke="#5B21B6" stroke-width="1.8"/>
  <line x1="67.5" y1="52" x2="77" y2="52" stroke="#5B21B6" stroke-width="1.8"/>
  <!-- Eyes -->
  <circle cx="41" cy="52" r="3.5" fill="#4C1D95"/>
  <circle cx="59" cy="52" r="3.5" fill="#4C1D95"/>
  <!-- Eye shine -->
  <circle cx="39.5" cy="50.5" r="1.2" fill="white"/>
  <circle cx="57.5" cy="50.5" r="1.2" fill="white"/>
  <!-- Smile -->
  <path d="M41 63 Q50 70 59 63" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="34" cy="63" r="5" fill="#C4B5FD" opacity="0.55"/>
  <circle cx="66" cy="63" r="5" fill="#C4B5FD" opacity="0.55"/>
  <!-- Resistor zigzag on chin/collar -->
  <polyline points="28,81 33,76 38,84 43,76 48,84 53,76 58,84 63,76 68,84 73,79" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lead lines -->
  <line x1="22" y1="80" x2="28" y2="80" stroke="#7C3AED" stroke-width="2"/>
  <line x1="73" y1="80" x2="80" y2="80" stroke="#7C3AED" stroke-width="2"/>
</svg>
