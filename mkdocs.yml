# Dan's MicroSite Standards from here down

theme:
  name: material
  favicon: img/favicon.ico
  icon:
    logo: material/chip
  font:
    text: Roboto
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.integrate
    - navigation.top
    # this adds the prev and next icons in the footer
    - navigation.footer
    - content.action.edit
plugins:
  - search
  # leave these commented out until we figure out the watcher bug that prevents live rebuilds
  # - social
  # - social_override

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      linenums: true
  # enable LaTeX extensions with KaTeX
  - pymdownx.arithmatex:
      generic: true
  # enable emoji shortcodes like :rocket: :white_check_mark:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - css/extra.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

extra_javascript:
  - js/iframe-resize.js
  - js/extra.js
  - js/tts-reader.js
  # configure KaTeX for rendering LaTeX math using backslash delimiters
  - js/katex.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js

