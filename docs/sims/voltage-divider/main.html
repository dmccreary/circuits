<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>Voltage Divider Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="../circuit-lib/circuit-lib.js"></script>
  <style>
    body { margin: 0; background: #f0f0f0; display: flex; justify-content: center; }
    main { display: block; }
    canvas { display: block; }
  </style>
</head>
<body>
<main>
<script>
// ── Voltage Divider MicroSim ──────────────────────────────────────────────
// Bloom L3 (Apply) — implement voltage divider circuits for specific Vout
// Dual mode:  A) "Find Vout"  B) "Find R2 for target Vout"

const CW = 620, CH = 520;
const SCHEM_W = 330;          // left schematic panel width
const PANEL_X = SCHEM_W;      // right calculator panel starts here
const CTRL_Y  = 380;          // y where controls begin

// ── colours ──────────────────────────────────────────────────────────────
const C_BG        = [245, 248, 252];
const C_CTRL      = [230, 235, 240];
const C_PANEL     = [240, 244, 250];
const C_ACCENT    = [0,   100, 180];   // blue
const C_WARN      = [200,  50,  30];   // red
const C_OK        = [30,  140,  60];   // green
const C_HIGHLIGHT = [255, 200,   0];   // yellow for Vout node

// ── state ─────────────────────────────────────────────────────────────────
let mode = 'findVout';   // 'findVout' | 'findR2'
let isAnimating = false;
let lineWidth = 3;

// Slider raw values (0-1)
let tVin = 0.5;   // maps  1-24 V   (linear)
let tR1  = 0.667; // maps 100-100k  (log)  → 10k default
let tR2  = 0.667; // maps 100-100k  (log)  → 10k default
let tVt  = 0.5;   // target Vout (0–Vin, linear, Mode B only)

// Derived values
let Vin, R1v, R2v, Vout, ratio;
let R2_required, warningMsg;
let Vtarget;

// ── log-scale helper ──────────────────────────────────────────────────────
// t in [0,1] → R in [100, 100000] Ω
function logR(t) {
  return Math.pow(10, 2 + t * 3);   // 10^2 = 100, 10^5 = 100000
}
function invLogR(R) {
  return (Math.log10(R) - 2) / 3;
}
function fmtR(ohms) {
  if (ohms >= 1000) return (ohms / 1000).toFixed(ohms >= 10000 ? 0 : 1) + 'kΩ';
  return Math.round(ohms) + 'Ω';
}
function fmtV(v) { return v.toFixed(2) + 'V'; }

// ── slider geometry ───────────────────────────────────────────────────────
const SL_X  = PANEL_X + 150;   // slider track left edge
const SL_W  = 130;             // slider track width
const SL_H  = 10;              // track height
const SL_R  = 8;               // thumb radius

// Row y-positions (top of each slider row)
const SL_VIN  = CTRL_Y + 22;
const SL_R1   = CTRL_Y + 54;
const SL_R2   = CTRL_Y + 86;
const SL_VT   = CTRL_Y + 118;  // target Vout (mode B only)

// ── button geometry ───────────────────────────────────────────────────────
const BTN_MODE_X = PANEL_X + 8, BTN_MODE_Y = CTRL_Y + 152, BTN_MODE_W = 190, BTN_MODE_H = 26;
const BTN_ANIM_X = PANEL_X + 8, BTN_ANIM_Y = CTRL_Y + 185, BTN_ANIM_W = 86, BTN_ANIM_H = 26;
const BTN_RST_X  = PANEL_X + 102, BTN_RST_Y = CTRL_Y + 185, BTN_RST_W  = 86, BTN_RST_H  = 26;

// ── dragging state ─────────────────────────────────────────────────────────
let dragging = null;  // { id, offset }

// ── p5 lifecycle ───────────────────────────────────────────────────────────
function setup() {
  let cnv = createCanvas(CW, CH);
  cnv.parent('main');
  textFont('Arial');
  recalc();
}

function draw() {
  if (isAnimating) animationTime += deltaTime;
  recalc();
  background(...C_BG);

  drawSchematicPanel();
  drawCalculatorPanel();
  drawSliders();
  drawButtons();
}

// ── recalculate derived values ─────────────────────────────────────────────
function recalc() {
  Vin  = map(tVin, 0, 1, 1, 24);
  R1v  = logR(tR1);
  R2v  = logR(tR2);
  Vtarget = map(tVt, 0, 1, 0.1, Vin * 0.99);

  if (mode === 'findVout') {
    Vout  = Vin * R2v / (R1v + R2v);
    ratio = R2v / (R1v + R2v);
    warningMsg = null;
    R2_required = null;
  } else {
    // Find R2 for target Vout
    Vout = Vtarget;
    ratio = Vtarget / Vin;
    R2_required = R1v * Vtarget / (Vin - Vtarget);
    warningMsg = null;
    if (R2_required < 10)     warningMsg = 'R2 too small (< 10Ω) — impractical';
    else if (R2_required > 10e6) warningMsg = 'R2 too large (> 10MΩ) — impractical';
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// SCHEMATIC PANEL
// ═══════════════════════════════════════════════════════════════════════════
function drawSchematicPanel() {
  // Background
  fill(255); noStroke();
  rect(0, 0, SCHEM_W, CH);

  // Title
  fill(30); noStroke(); textSize(13); textAlign(CENTER);
  text('Voltage Divider', SCHEM_W / 2, 22);

  // Circuit geometry
  const MX   = SCHEM_W / 2;    // horizontal centre
  const TOP  = 50;
  const BOT  = CTRL_Y - 20;
  const MID  = (TOP + BOT) / 2;  // output tap y
  const BATX = MX - 90;          // battery x centre
  const WIRX = MX + 40;          // right wire column x

  // ── battery (left side, vertical) ─────────────────────────────────────
  // Battery: left column from TOP to BOT
  const BATW = 26, BATH = 60;
  drawBattery(BATX - BATW / 2, MID - BATH / 2, BATW, BATH, VERTICAL);

  // + / − labels
  fill(30); noStroke(); textSize(11); textAlign(LEFT);
  text('+', BATX + 16, TOP + 18);
  text('−', BATX + 16, BOT - 6);

  // Vin label
  fill(...C_ACCENT); textSize(12); textAlign(CENTER);
  text('Vin = ' + fmtV(Vin), BATX, MID - BATH / 2 - 14);

  // ── wires ─────────────────────────────────────────────────────────────
  const wireColor = [20, 20, 20];
  const wireSpeed = 0.06;
  const wireSpacing = 0.8;

  // Top wire: battery(+) → R1 top
  const BAT_TOP = MID - BATH / 2;
  const BAT_BOT = MID + BATH / 2;
  const R1_TOP = TOP + 10;
  const R1_BOT = MID - 10;
  const R2_TOP = MID + 10;
  const R2_BOT = BOT - 10;

  // Left column: battery top pin → top rail
  stroke(0); strokeWeight(lineWidth);
  if (isAnimating) {
    lineWidth = 2.5;
    drawAnimatedWire(BATX, BAT_TOP, BATX, TOP, wireSpeed, wireSpacing);
    // top rail: left → right
    drawAnimatedWire(BATX, TOP, WIRX, TOP, wireSpeed, wireSpacing);
    // right column: top → R1 top
    drawAnimatedWire(WIRX, TOP, WIRX, R1_TOP, wireSpeed, wireSpacing);
  } else {
    stroke(0); strokeWeight(2.5);
    line(BATX, BAT_TOP, BATX, TOP);
    line(BATX, TOP, WIRX, TOP);
    line(WIRX, TOP, WIRX, R1_TOP);
  }

  // R1: top portion of right column
  drawResistor(WIRX - 18, R1_TOP, 36, R1_BOT - R1_TOP, 2.5, VERTICAL, 'R1', LEFT);
  // R1 value label
  fill(60); noStroke(); textSize(10); textAlign(RIGHT);
  text(fmtR(R1v), WIRX - 24, (R1_TOP + R1_BOT) / 2 + 4);

  // wire gap between R1 bot and R2 top (output tap horizontal line)
  stroke(0); strokeWeight(2.5);

  // output tap: horizontal line from WIRX to TAP_X
  const TAP_X = WIRX + 55;
  if (isAnimating) {
    lineWidth = 2.5;
    drawAnimatedWire(WIRX, MID, TAP_X, MID, wireSpeed * ratio, wireSpacing);
  } else {
    line(WIRX, MID, TAP_X, MID);
  }

  // Vout label block (right of tap)
  // Highlight circle at tap node
  noFill(); stroke(...C_HIGHLIGHT); strokeWeight(3);
  circle(WIRX, MID, 14);
  // Vout label
  fill(mode === 'findVout' ? color(...C_OK) : color(...C_ACCENT));
  noStroke(); textSize(12); textAlign(LEFT);
  text('Vout = ' + fmtV(Vout), TAP_X + 6, MID + 4);

  // R2: lower portion of right column
  drawResistor(WIRX - 18, R2_TOP, 36, R2_BOT - R2_TOP, 2.5, VERTICAL,
    mode === 'findVout' ? 'R2' : 'R2?', LEFT);
  // R2 value label
  fill(60); noStroke(); textSize(10); textAlign(RIGHT);
  if (mode === 'findVout') {
    text(fmtR(R2v), WIRX - 24, (R2_TOP + R2_BOT) / 2 + 4);
  } else {
    const rr = R2_required;
    const label = (rr && rr >= 10 && rr <= 10e6) ? fmtR(rr) : '?';
    fill(rr && rr >= 10 && rr <= 10e6 ? color(...C_OK) : color(...C_WARN));
    text(label, WIRX - 24, (R2_TOP + R2_BOT) / 2 + 4);
  }

  // Bottom wire: R2 bot → battery(−)
  if (isAnimating) {
    lineWidth = 2.5;
    drawAnimatedWire(WIRX, R2_BOT, WIRX, BOT, wireSpeed, wireSpacing);
    drawAnimatedWire(WIRX, BOT, BATX, BOT, wireSpeed, wireSpacing);
    drawAnimatedWire(BATX, BOT, BATX, BAT_BOT, wireSpeed, wireSpacing);
  } else {
    stroke(0); strokeWeight(2.5);
    line(WIRX, R2_BOT, WIRX, BOT);
    line(WIRX, BOT, BATX, BOT);
    line(BATX, BOT, BATX, BAT_BOT);
  }

  // Ground symbol at bottom
  drawGround(BATX, BOT + 2);

  // ── voltage bar (right edge of schematic) ─────────────────────────────
  drawVoltageBar(MX - 20, TOP, BOT, Vin, Vout);

  // ── divider formula ───────────────────────────────────────────────────
  fill(50); noStroke(); textSize(10); textAlign(CENTER);
  text('Vout = Vin × R2/(R1+R2)', SCHEM_W / 2, CTRL_Y - 5);
}

// ── Ground symbol ──────────────────────────────────────────────────────────
function drawGround(cx, y) {
  stroke(0); strokeWeight(2);
  line(cx - 12, y, cx + 12, y);
  line(cx -  8, y + 5, cx + 8, y + 5);
  line(cx -  4, y + 10, cx + 4, y + 10);
}

// ── Voltage bar: visual proportion of Vout / Vin ──────────────────────────
function drawVoltageBar(x, top, bot, vin, vout) {
  const bw = 14, totalH = bot - top;
  const voutH = (vout / vin) * totalH;

  // Full bar (Vin) - light gray
  fill(210); noStroke(); rect(x, top, bw, totalH, 3);
  // Vout portion - blue
  fill(...C_ACCENT); rect(x, top + (totalH - voutH), bw, voutH, 3);

  // Labels
  fill(30); noStroke(); textSize(9); textAlign(LEFT);
  text('Vin', x + bw + 4, top + 9);
  fill(...C_ACCENT);
  text('Vout', x + bw + 4, top + totalH - voutH + 9);
}

// ═══════════════════════════════════════════════════════════════════════════
// CALCULATOR PANEL
// ═══════════════════════════════════════════════════════════════════════════
function drawCalculatorPanel() {
  // Background
  fill(...C_PANEL); noStroke();
  rect(PANEL_X, 0, CW - PANEL_X, CTRL_Y);

  // Title
  fill(30); noStroke(); textSize(13); textAlign(CENTER);
  text('Calculator', PANEL_X + (CW - PANEL_X) / 2, 22);

  const LX = PANEL_X + 12;
  const VX = CW - 12;
  let y = 42;

  function calcRow(label, value, color) {
    fill(80); noStroke(); textSize(11); textAlign(LEFT);
    text(label, LX, y);
    fill(color[0], color[1], color[2]);
    textAlign(RIGHT);
    text(value, VX, y);
    y += 22;
  }

  calcRow('Vin', fmtV(Vin), [30, 30, 30]);
  calcRow('R1', fmtR(R1v), [30, 30, 30]);

  if (mode === 'findVout') {
    calcRow('R2', fmtR(R2v), [30, 30, 30]);
    y += 4;
    // Divider line
    stroke(180); strokeWeight(1);
    line(LX, y - 6, VX, y - 6);
    noStroke();
    // Result
    fill(80); textSize(11); textAlign(LEFT);
    text('Ratio R2/(R1+R2)', LX, y);
    fill(...C_ACCENT);
    textAlign(RIGHT);
    text((ratio * 100).toFixed(1) + '%', VX, y);
    y += 22;

    fill(80); textSize(13); textAlign(LEFT); textStyle(BOLD);
    text('Vout', LX, y);
    textStyle(NORMAL);
    fill(...C_OK);
    textSize(16); textAlign(RIGHT);
    text(fmtV(Vout), VX, y);
    y += 30;
  } else {
    // Mode B: Find R2
    fill(80); textSize(11); textAlign(LEFT);
    text('Target Vout', LX, y);
    fill(...C_ACCENT);
    textAlign(RIGHT);
    text(fmtV(Vtarget), VX, y);
    y += 22;

    y += 4;
    stroke(180); strokeWeight(1);
    line(LX, y - 6, VX, y - 6);
    noStroke();

    fill(80); textSize(11); textAlign(LEFT);
    text('Ratio needed', LX, y);
    fill(...C_ACCENT);
    textAlign(RIGHT);
    text((ratio * 100).toFixed(1) + '%', VX, y);
    y += 22;

    // R2 required
    fill(80); textSize(13); textAlign(LEFT); textStyle(BOLD);
    text('R2 required', LX, y);
    textStyle(NORMAL);
    const ok = R2_required && R2_required >= 10 && R2_required <= 10e6;
    fill(ok ? color(...C_OK) : color(...C_WARN));
    textSize(ok ? 16 : 12);
    textAlign(RIGHT);
    text(R2_required ? fmtR(R2_required) : '—', VX, y);
    y += ok ? 30 : 18;

    // Warning
    if (warningMsg) {
      fill(...C_WARN); textSize(10); textAlign(LEFT);
      text('⚠ ' + warningMsg, LX, y);
      y += 16;
    }
  }

  // ── Current info ───────────────────────────────────────────────────────
  const Ival = (mode === 'findVout') ? Vin / (R1v + R2v) : Vin / (R1v + (R2_required || R2v));
  const IuA = Ival * 1e6;
  const ImA = Ival * 1e3;
  const Istr = IuA < 1000 ? IuA.toFixed(1) + 'µA' : ImA.toFixed(2) + 'mA';

  y = CTRL_Y - 52;
  stroke(200); strokeWeight(1); line(LX, y, VX, y); noStroke();
  y += 12;
  fill(80); textSize(10); textAlign(LEFT);
  text('Current (I = Vin/(R1+R2))', LX, y);
  fill(100); textAlign(RIGHT);
  text(Istr, VX, y);

  // Power
  const Ptotal = Vin * Ival;
  y += 16;
  fill(80); textSize(10); textAlign(LEFT);
  text('Total power dissipation', LX, y);
  const PmW = Ptotal * 1000;
  fill(100); textAlign(RIGHT);
  text(PmW < 1 ? (Ptotal * 1e6).toFixed(1) + 'µW' : PmW.toFixed(2) + 'mW', VX, y);
}

// ═══════════════════════════════════════════════════════════════════════════
// SLIDERS
// ═══════════════════════════════════════════════════════════════════════════
function drawSliders() {
  fill(...C_CTRL); noStroke();
  rect(PANEL_X, CTRL_Y, CW - PANEL_X, CH - CTRL_Y);

  // Divider between schematic controls and calculator controls
  stroke(180); strokeWeight(1);
  line(0, CTRL_Y, SCHEM_W, CTRL_Y);
  noStroke();

  drawOneSlider('Vin', SL_VIN, tVin, fmtV(Vin), true);
  drawOneSlider('R1', SL_R1, tR1, fmtR(R1v), true);

  if (mode === 'findVout') {
    drawOneSlider('R2', SL_R2, tR2, fmtR(R2v), true);
    drawOneSlider('Target Vout', SL_VT, tVt, fmtV(Vtarget), false);
  } else {
    drawOneSlider('R2', SL_R2, tR2, fmtR(R2v), false);
    drawOneSlider('Target Vout', SL_VT, tVt, fmtV(Vtarget), true);
  }
}

function drawOneSlider(label, cy, t, valStr, active) {
  const alpha = active ? 255 : 130;
  // Label
  fill(active ? 50 : 140); noStroke();
  textSize(11); textAlign(RIGHT);
  text(label + ':', SL_X - 6, cy + 4);
  // Value
  fill(active ? color(...C_ACCENT) : color(160));
  textAlign(LEFT);
  text(valStr, SL_X + SL_W + 8, cy + 4);

  // Track
  const trackColor = active ? [160, 175, 195] : [195, 200, 205];
  fill(...trackColor); noStroke();
  rect(SL_X, cy - SL_H / 2, SL_W, SL_H, 3);

  // Filled portion
  if (active) {
    fill(...C_ACCENT);
    rect(SL_X, cy - SL_H / 2, t * SL_W, SL_H, 3);
  }

  // Thumb
  const tx = SL_X + t * SL_W;
  fill(active ? 255 : 210); stroke(active ? color(...C_ACCENT) : color(170)); strokeWeight(2);
  circle(tx, cy, SL_R * 2);
}

// ═══════════════════════════════════════════════════════════════════════════
// BUTTONS
// ═══════════════════════════════════════════════════════════════════════════
function drawButtons() {
  // Mode toggle button
  const modeLabel = mode === 'findVout' ? '▶ Find Vout  |  Find R2 for target' : 'Find Vout  |  ▶ Find R2 for target';
  drawBtn(BTN_MODE_X, BTN_MODE_Y, BTN_MODE_W, BTN_MODE_H, modeLabel, [60, 80, 120], 255, 10);

  // Start/Stop
  const animLabel = isAnimating ? 'Stop' : 'Start';
  const animColor = isAnimating ? [160, 40, 40] : [40, 120, 60];
  drawBtn(BTN_ANIM_X, BTN_ANIM_Y, BTN_ANIM_W, BTN_ANIM_H, animLabel, animColor, 255, 11);

  // Reset
  drawBtn(BTN_RST_X, BTN_RST_Y, BTN_RST_W, BTN_RST_H, 'Reset', [80, 80, 100], 255, 11);
}

function drawBtn(x, y, w, h, label, bg, fg, sz) {
  fill(bg[0], bg[1], bg[2]); noStroke();
  rect(x, y, w, h, 5);
  fill(fg); textSize(sz); textAlign(CENTER); noStroke();
  text(label, x + w / 2, y + h / 2 + 4);
}

function inBtn(mx, my, x, y, w, h) {
  return mx >= x && mx <= x + w && my >= y && my <= y + h;
}

// ═══════════════════════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════════════════════
function mousePressed() {
  // Buttons
  if (inBtn(mouseX, mouseY, BTN_MODE_X, BTN_MODE_Y, BTN_MODE_W, BTN_MODE_H)) {
    mode = (mode === 'findVout') ? 'findR2' : 'findVout';
    return;
  }
  if (inBtn(mouseX, mouseY, BTN_ANIM_X, BTN_ANIM_Y, BTN_ANIM_W, BTN_ANIM_H)) {
    isAnimating = !isAnimating;
    return;
  }
  if (inBtn(mouseX, mouseY, BTN_RST_X, BTN_RST_Y, BTN_RST_W, BTN_RST_H)) {
    resetSim();
    return;
  }

  // Sliders — check if thumb hit
  tryGrabSlider(mouseX, mouseY);
}

function mouseDragged() {
  if (!dragging) return;
  const raw = constrain((mouseX - SL_X) / SL_W, 0, 1);
  switch (dragging) {
    case 'Vin': tVin = raw; break;
    case 'R1':  tR1  = raw; break;
    case 'R2':  if (mode === 'findVout') tR2 = raw; break;
    case 'Vt':  if (mode === 'findR2')   tVt = raw; break;
  }
}

function mouseReleased() { dragging = null; }

function tryGrabSlider(mx, my) {
  const sliders = [
    { id: 'Vin', cy: SL_VIN, t: tVin,  active: true },
    { id: 'R1',  cy: SL_R1,  t: tR1,   active: true },
    { id: 'R2',  cy: SL_R2,  t: tR2,   active: mode === 'findVout' },
    { id: 'Vt',  cy: SL_VT,  t: tVt,   active: mode === 'findR2'  },
  ];
  for (const s of sliders) {
    if (!s.active) continue;
    const tx = SL_X + s.t * SL_W;
    if (dist(mx, my, tx, s.cy) <= SL_R + 4) {
      dragging = s.id;
      return;
    }
    // Also allow clicking anywhere on the track
    if (my >= s.cy - SL_H && my <= s.cy + SL_H && mx >= SL_X && mx <= SL_X + SL_W) {
      dragging = s.id;
      // Immediately update
      const raw = constrain((mx - SL_X) / SL_W, 0, 1);
      switch (s.id) {
        case 'Vin': tVin = raw; break;
        case 'R1':  tR1  = raw; break;
        case 'R2':  tR2  = raw; break;
        case 'Vt':  tVt  = raw; break;
      }
      return;
    }
  }
}

function resetSim() {
  tVin = map(12, 1, 24, 0, 1);          // 12V
  tR1  = invLogR(10000);                // 10kΩ
  tR2  = invLogR(10000);                // 10kΩ
  tVt  = 0.5;                           // 6V target
  isAnimating = false;
  animationTime = 0;
  mode = 'findVout';
}
</script>
</main>
<script src="../../js/microsim-controls.js"></script>
