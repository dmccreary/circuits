<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ohm's Law Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #e8eaf0; display: flex; justify-content: center; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
new p5(function(p) {
  // State: which variable is calculated (0=V, 1=I, 2=R)
  // Default: V and R locked, I calculated
  let locked = [true, false, true];  // V locked, I calculated, R locked

  let vals = { V: 5, I: 0.005, R: 1000 };  // SI units

  // Slider objects (canvas-based)
  let sliders = {
    V: { x: 0, y: 0, w: 0, val: 5,    min: 0.1,  max: 50,    step: 0.1  },
    I: { x: 0, y: 0, w: 0, val: 5,    min: 0.1,  max: 1000,  step: 0.1  }, // mA
    R: { x: 0, y: 0, w: 0, val: 1000, min: 1,    max: 100000,step: 1    }
  };

  let dragging = null;  // 'V', 'I', or 'R'
  let panelW = 240;
  let panelH = 200;
  let panelY = 100;
  let panelGap = 15;
  let firstPanelX;

  p.setup = function() {
    p.createCanvas(820, 500);
    firstPanelX = (820 - 3 * panelW - 2 * panelGap) / 2;
    updateSliderPositions();
    recalculate();
  };

  function updateSliderPositions() {
    let keys = ['V', 'I', 'R'];
    for (let i = 0; i < 3; i++) {
      let px = firstPanelX + i * (panelW + panelGap);
      sliders[keys[i]].x = px + 20;
      sliders[keys[i]].y = panelY + panelH - 55;
      sliders[keys[i]].w = panelW - 40;
    }
  }

  function recalculate() {
    let calcIdx = locked.indexOf(false);
    if (calcIdx === -1) return;
    if (calcIdx === 0) {
      vals.V = vals.I * vals.R;
      sliders.V.val = vals.V;
    } else if (calcIdx === 1) {
      vals.I = vals.V / vals.R;
      sliders.I.val = vals.I * 1000;  // store as mA
    } else {
      vals.R = vals.V / vals.I;
      sliders.R.val = vals.R;
    }
    clampSliderVals();
  }

  function clampSliderVals() {
    sliders.V.val = p.constrain(sliders.V.val, sliders.V.min, sliders.V.max);
    sliders.I.val = p.constrain(sliders.I.val, sliders.I.min, sliders.I.max);
    sliders.R.val = p.constrain(sliders.R.val, sliders.R.min, sliders.R.max);
  }

  p.draw = function() {
    p.background('#e8eaf0');
    drawTitle();
    drawFormula();
    drawPanels();
    drawTriangle();
    drawPowerDisplay();
  };

  function drawTitle() {
    p.fill(30);
    p.noStroke();
    p.textSize(22);
    p.textAlign(p.CENTER, p.TOP);
    p.textStyle(p.BOLD);
    p.text("Ohm's Law Interactive Calculator", 410, 10);
    p.textStyle(p.NORMAL);
  }

  function drawFormula() {
    p.fill(40);
    p.noStroke();
    p.textSize(28);
    p.textAlign(p.CENTER, p.CENTER);
    p.textStyle(p.BOLD);
    p.text('V  =  I  ×  R', 410, 70);
    p.textStyle(p.NORMAL);
  }

  function drawPanels() {
    let keys    = ['V', 'I', 'R'];
    let labels  = ['Voltage (V)', 'Current (I)', 'Resistance (R)'];
    let colors  = [[50, 100, 200], [200, 100, 20], [30, 140, 60]];
    let units   = ['V', 'mA', 'Ω'];

    for (let i = 0; i < 3; i++) {
      let px = firstPanelX + i * (panelW + panelGap);
      let py = panelY;
      let key = keys[i];
      let isLocked = locked[i];
      let isCalc   = !isLocked;

      // Panel background
      p.fill(isCalc ? 255 : 245);
      p.stroke(colors[i][0], colors[i][1], colors[i][2]);
      p.strokeWeight(3);
      p.rect(px, py, panelW, panelH, 10);

      // Header
      p.fill(colors[i][0], colors[i][1], colors[i][2]);
      p.noStroke();
      p.rect(px, py, panelW, 36, 10, 10, 0, 0);
      p.fill(255);
      p.textSize(14);
      p.textAlign(p.CENTER, p.CENTER);
      p.textStyle(p.BOLD);
      p.text(labels[i], px + panelW / 2, py + 18);
      p.textStyle(p.NORMAL);

      // Value display
      let displayVal = getDisplayVal(key);
      let dispColor = isCalc ? p.color(180, 0, 0) : p.color(20, 20, 20);
      p.fill(dispColor);
      p.textSize(30);
      p.textAlign(p.CENTER, p.CENTER);
      p.textStyle(p.BOLD);
      p.text(formatVal(key) + ' ' + units[i], px + panelW / 2, py + 80);
      p.textStyle(p.NORMAL);

      // Calculated badge
      if (isCalc) {
        p.fill(220, 0, 0, 200);
        p.noStroke();
        p.rect(px + panelW - 85, py + 44, 78, 22, 4);
        p.fill(255);
        p.textSize(11);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('CALCULATED', px + panelW - 46, py + 55);
      }

      // Slider (only if locked)
      if (isLocked) {
        drawSlider(key, px, py);
      } else {
        p.fill(160);
        p.textSize(12);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('(unlock to adjust)', px + panelW / 2, py + panelH - 35);
      }

      // Lock button
      drawLockButton(i, px + panelW / 2, py + panelH + 12);
    }
  }

  function getDisplayVal(key) {
    if (key === 'V') return vals.V;
    if (key === 'I') return vals.I * 1000;
    if (key === 'R') return vals.R;
  }

  function formatVal(key) {
    if (key === 'V') {
      return vals.V.toFixed(vals.V < 10 ? 2 : 1);
    }
    if (key === 'I') {
      let mA = vals.I * 1000;
      return mA.toFixed(mA < 10 ? 2 : 1);
    }
    if (key === 'R') {
      if (vals.R >= 1000) return (vals.R / 1000).toFixed(vals.R < 10000 ? 2 : 1) + ' k';
      return vals.R.toFixed(0);
    }
  }

  // lockBtnY is below panel
  let lockBtns = [];
  function drawLockButton(idx, cx, cy) {
    lockBtns[idx] = { cx, cy, w: 80, h: 26 };
    let isLocked = locked[idx];
    p.fill(isLocked ? [60, 60, 200] : [180, 180, 180]);
    p.stroke(isLocked ? [30, 30, 150] : [120, 120, 120]);
    p.strokeWeight(1.5);
    p.rect(cx - 40, cy - 13, 80, 26, 6);
    p.fill(255);
    p.noStroke();
    p.textSize(13);
    p.textAlign(p.CENTER, p.CENTER);
    p.text(isLocked ? '🔒 Locked' : '🔓 Unlocked', cx, cy);
  }

  function drawSlider(key, px, py) {
    let sl = sliders[key];
    let sx = px + 20;
    let sy = py + panelH - 40;
    let sw = panelW - 40;

    // Track
    p.stroke(200);
    p.strokeWeight(4);
    p.line(sx, sy, sx + sw, sy);

    // Fill
    let t = (sl.val - sl.min) / (sl.max - sl.min);
    let tx = sx + t * sw;
    p.stroke(100, 140, 220);
    p.strokeWeight(4);
    p.line(sx, sy, tx, sy);

    // Thumb
    p.fill(60, 80, 200);
    p.noStroke();
    p.circle(tx, sy, 16);

    // Store for interaction
    sl.x = sx; sl.y = sy; sl.w = sw;
  }

  function drawTriangle() {
    let tx = 310;
    let ty = 370;
    let tw = 200;
    let th = 80;

    // Triangle outline
    p.stroke(80);
    p.strokeWeight(2);
    p.fill(255, 255, 220);
    p.triangle(tx + tw / 2, ty, tx, ty + th, tx + tw, ty + th);

    // Dividing line
    p.stroke(80);
    p.strokeWeight(1.5);
    p.line(tx + tw / 2, ty + th, tx + tw / 2, ty + 30);

    // V label
    p.fill(50, 100, 200);
    p.noStroke();
    p.textSize(20);
    p.textStyle(p.BOLD);
    p.textAlign(p.CENTER, p.CENTER);
    p.text('V', tx + tw / 2, ty + 30);

    // I label
    p.fill(200, 100, 20);
    p.text('I', tx + tw / 4, ty + th - 18);

    // R label
    p.fill(30, 140, 60);
    p.text('R', tx + 3 * tw / 4, ty + th - 18);

    p.textStyle(p.NORMAL);

    // Highlight calculated
    let calcIdx = locked.indexOf(false);
    if (calcIdx === 0) {
      // V is calculated — highlight top
      p.noFill();
      p.stroke(180, 0, 0);
      p.strokeWeight(3);
      p.triangle(tx + tw / 2, ty + 2, tx + 4, ty + th - 2, tx + tw - 4, ty + th - 2);
    }

    p.noStroke();
    p.fill(60);
    p.textSize(13);
    p.textAlign(p.LEFT, p.CENTER);
    p.text('Ohm\'s Law Triangle: cover the unknown, read the formula', 530, ty + th / 2);
  }

  function drawPowerDisplay() {
    let pw = vals.V * vals.I;
    let pwStr;
    if (pw < 0.001)      pwStr = (pw * 1000000).toFixed(2) + ' μW';
    else if (pw < 1)     pwStr = (pw * 1000).toFixed(2) + ' mW';
    else if (pw < 1000)  pwStr = pw.toFixed(3) + ' W';
    else                 pwStr = (pw / 1000).toFixed(3) + ' kW';

    let bx = 180, by = 455, bw = 460, bh = 34;
    p.fill(50, 50, 50, 220);
    p.noStroke();
    p.rect(bx, by, bw, bh, 8);
    p.fill(255, 220, 50);
    p.textSize(15);
    p.textAlign(p.CENTER, p.CENTER);
    p.textStyle(p.BOLD);
    p.text('Power: P = V × I = ' + formatVal('V') + ' V × ' +
      formatVal('I') + ' mA = ' + pwStr, bx + bw / 2, by + bh / 2);
    p.textStyle(p.NORMAL);
  }

  // ── Interaction ────────────────────────────────────────────────────────

  p.mousePressed = function() {
    // Check lock buttons
    for (let i = 0; i < 3; i++) {
      let b = lockBtns[i];
      if (!b) continue;
      if (p.mouseX >= b.cx - 40 && p.mouseX <= b.cx + 40 &&
          p.mouseY >= b.cy - 13 && p.mouseY <= b.cy + 13) {
        // Toggle lock — but always keep exactly one unlocked
        let numLocked = locked.filter(Boolean).length;
        if (locked[i] && numLocked <= 2) {
          // Unlock this, lock whichever is currently unlocked
          let prevUnlocked = locked.indexOf(false);
          if (prevUnlocked !== -1) locked[prevUnlocked] = true;
          locked[i] = false;
          recalculate();
        } else if (!locked[i]) {
          // Can't unlock if already unlocked — do nothing or toggle adjacent
        } else {
          locked[i] = false;
          recalculate();
        }
        return;
      }
    }

    // Check sliders
    let keys = ['V', 'I', 'R'];
    for (let i = 0; i < 3; i++) {
      if (!locked[i]) continue;
      let key = keys[i];
      let sl = sliders[key];
      if (!sl.x) continue;
      let dist = Math.abs(p.mouseY - sl.y);
      if (dist < 15 && p.mouseX >= sl.x - 10 && p.mouseX <= sl.x + sl.w + 10) {
        dragging = key;
        updateSliderVal(key);
        return;
      }
    }
  };

  p.mouseDragged = function() {
    if (dragging) {
      updateSliderVal(dragging);
    }
  };

  p.mouseReleased = function() {
    dragging = null;
  };

  function updateSliderVal(key) {
    let sl = sliders[key];
    if (!sl.x) return;
    let t = p.constrain((p.mouseX - sl.x) / sl.w, 0, 1);
    sl.val = sl.min + t * (sl.max - sl.min);
    // Update vals from slider
    if (key === 'V') vals.V = sl.val;
    if (key === 'I') vals.I = sl.val / 1000;
    if (key === 'R') vals.R = sl.val;
    recalculate();
  }
});
</script>
<script src="../../js/microsim-controls.js"></script>
</body>
</html>
