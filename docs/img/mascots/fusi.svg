<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#FEF2F2" stroke="#DC2626" stroke-width="2.5"/>
  <!-- Fuse body: horizontal cylinder -->
  <rect x="18" y="38" width="64" height="24" rx="12" ry="12"
        fill="#FECACA" stroke="#DC2626" stroke-width="2.5"/>
  <!-- Fuse wire inside (thin line through center) -->
  <line x1="30" y1="50" x2="70" y2="50" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Left end cap -->
  <rect x="12" y="43" width="10" height="14" rx="3"
        fill="#F87171" stroke="#DC2626" stroke-width="2"/>
  <!-- Right end cap -->
  <rect x="78" y="43" width="10" height="14" rx="3"
        fill="#F87171" stroke="#DC2626" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="41" cy="47" r="4.5" fill="#991B1B"/>
  <circle cx="59" cy="47" r="4.5" fill="#991B1B"/>
  <!-- Eye shine -->
  <circle cx="39.5" cy="45.5" r="1.6" fill="white"/>
  <circle cx="57.5" cy="45.5" r="1.6" fill="white"/>
  <!-- Alert expression: eyebrows angled inward -->
  <line x1="37" y1="41" x2="45" y2="43.5" stroke="#991B1B" stroke-width="2" stroke-linecap="round"/>
  <line x1="63" y1="41" x2="55" y2="43.5" stroke="#991B1B" stroke-width="2" stroke-linecap="round"/>
  <!-- Mouth: open O shape (concerned) -->
  <ellipse cx="50" cy="56" rx="5" ry="4" fill="#991B1B"/>
  <ellipse cx="50" cy="56" rx="3" ry="2.5" fill="#FECACA"/>
  <!-- Cheeks -->
  <circle cx="33" cy="54" r="4" fill="#F87171" opacity="0.5"/>
  <circle cx="67" cy="54" r="4" fill="#F87171" opacity="0.5"/>
  <!-- Small exclamation mark badge -->
  <circle cx="73" cy="28" r="9" fill="#DC2626"/>
  <text x="73" y="32" font-size="13" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">!</text>
</svg>
