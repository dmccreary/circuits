<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
  <!-- Capacitor plates as hat / ears -->
  <!-- Left plate ear -->
  <rect x="10" y="32" width="16" height="38" rx="3" fill="#1D4ED8" opacity="0.85"/>
  <!-- Right plate ear -->
  <rect x="74" y="32" width="16" height="38" rx="3" fill="#1D4ED8" opacity="0.85"/>
  <!-- Wire leads from ears -->
  <line x1="26" y1="51" x2="34" y2="51" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="66" y1="51" x2="74" y2="51" stroke="#2563EB" stroke-width="2.5"/>
  <!-- Face -->
  <circle cx="50" cy="51" r="30" fill="#DBEAFE"/>
  <!-- Eyes -->
  <circle cx="41" cy="47" r="5" fill="#1D4ED8"/>
  <circle cx="59" cy="47" r="5" fill="#1D4ED8"/>
  <!-- Eye shine -->
  <circle cx="39" cy="45" r="1.8" fill="white"/>
  <circle cx="57" cy="45" r="1.8" fill="white"/>
  <!-- Big happy smile -->
  <path d="M36 60 Q50 74 64 60" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <!-- Smile fill -->
  <path d="M36 60 Q50 74 64 60 Q50 67 36 60" fill="#BFDBFE" opacity="0.6"/>
  <!-- Cheeks -->
  <circle cx="34" cy="60" r="6" fill="#93C5FD" opacity="0.55"/>
  <circle cx="66" cy="60" r="6" fill="#93C5FD" opacity="0.55"/>
  <!-- Little lightbulb on top of head -->
  <circle cx="50" cy="20" r="8" fill="#FEF08A" stroke="#CA8A04" stroke-width="1.5"/>
  <rect x="46" y="27" width="8" height="5" rx="1" fill="#A16207"/>
  <!-- Bulb shine -->
  <line x1="47" y1="16" x2="45" y2="14" stroke="#FDE047" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="16" x2="55" y2="14" stroke="#FDE047" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="14" x2="50" y2="11" stroke="#FDE047" stroke-width="1.5" stroke-linecap="round"/>
</svg>
