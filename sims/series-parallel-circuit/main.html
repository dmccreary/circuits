<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Series-Parallel Circuit Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
<style>
  body { margin: 0; padding: 0; background: #e8eaf0; }
  canvas { display: block; }
</style>
</head>
<body>
<main></main>
<script>
// ============================================================
// Series-Parallel Circuit Analysis MicroSim
// Chapter 2 – Topology: Vs → R1(series) → [R2 ∥ R3] → R4(series)
// 6-stage step-through analysis, self-contained drawing
// ============================================================

const CW       = 720;
const circuitH = 410;
const controlH = 155;
const CH       = circuitH + controlH;
const PANEL_X  = 460;

const LW = 2.5;  // default line width

// ── Schematic geometry ────────────────────────────────────
const TOP_Y  = 110;   // top rail y
const BOT_Y  = 285;   // bottom rail y
const PAR_Y  = 225;   // R3 lower path y
const BAT_CX = 62;    // battery x
const BAT_CY = (TOP_Y + BOT_Y) / 2;   // 197
const BAT_H  = 72;

// Key x positions along top rail
const R1_XL  = 95;
const R1_XR  = 195;   // = Node A x
const AX     = 195;
const PAR_XR = 345;   // = Node B x
const BX     = 345;
const R4_XR  = 435;
const RC_X   = 435;   // right corner

// Resistor height (horizontal zigzag bounding box)
const RH_H = 34;

// ── Circuit values ────────────────────────────────────────
let Vs  = 24;
let R1v = 2000;
let R2v = 6000;
let R3v = 3000;
let R4v = 1000;
let R23, R_total, I_total, V1, V23, V4, I2, I3;

function recalculate() {
    R23     = (R2v * R3v) / (R2v + R3v);
    R_total = R1v + R23 + R4v;
    I_total = Vs / R_total;
    V1      = I_total * R1v;
    V23     = I_total * R23;
    V4      = I_total * R4v;
    I2      = V23 / R2v;
    I3      = V23 / R3v;
}

// ── Stage & animation ─────────────────────────────────────
let stage      = 1;
const NSTAGE   = 6;
let isAnimating = false;
let animTime   = 0;

// ── Slider layout ─────────────────────────────────────────
const SL_LM = 255;
const SL_X  = SL_LM;
const SL_W  = CW - SL_LM - 20;
const SL_VS = circuitH + 40;
const SL_R1 = circuitH + 63;
const SL_R2 = circuitH + 86;
const SL_R3 = circuitH + 109;
const SL_R4 = circuitH + 132;

// ── Buttons ───────────────────────────────────────────────
const BY     = circuitH + 8;
const PREV_B = { x: 10,  y: BY, w: 90,  h: 26 };
const NEXT_B = { x: 165, y: BY, w: 90,  h: 26 };
const ANIM_B = { x: 380, y: BY, w: 130, h: 26 };
const RSET_B = { x: 520, y: BY, w: 80,  h: 26 };

let dragSlider = null;
const SLIDER_DEFS = [
    { key: 'vs', cy: SL_VS, mn: 1,   mx: 40    },
    { key: 'r1', cy: SL_R1, mn: 500, mx: 5000  },
    { key: 'r2', cy: SL_R2, mn: 500, mx: 10000 },
    { key: 'r3', cy: SL_R3, mn: 500, mx: 10000 },
    { key: 'r4', cy: SL_R4, mn: 500, mx: 5000  },
];

// ── Format helpers ────────────────────────────────────────
function fmtV(v)  { return v.toFixed(2) + ' V'; }
function fmtI(v)  { return (v * 1000).toFixed(2) + ' mA'; }
function fmtR(v)  { return v >= 1000 ? (v / 1000).toFixed(2).replace(/\.?0+$/, '') + ' kΩ' : v.toFixed(0) + ' Ω'; }

// ============================================================
// SETUP & DRAW
// ============================================================
function setup() {
    createCanvas(CW, CH).parent(select('main').elt);
    textFont('Arial');
    recalculate();
}

function draw() {
    if (isAnimating && stage >= 5) animTime += deltaTime;
    background(232, 234, 240);
    drawSchematic();
    drawLogPanel();
    drawControls();
}

// ============================================================
// SCHEMATIC
// ============================================================
function drawSchematic() {
    fill(252, 252, 255); noStroke();
    rect(0, 0, PANEL_X, circuitH, 8, 0, 0, 8);

    const titles = ['', 'Original Circuit', 'Identify Parallel Group',
        'Replace R2∥R3 → R23', 'Find Total Resistance',
        'Calculate Total Current', 'Work Backward'];
    fill(20, 30, 80); textSize(13); textStyle(BOLD); textAlign(CENTER, TOP);
    text(titles[stage], PANEL_X / 2, 8);
    textStyle(NORMAL);

    // Node labels
    fill(60, 60, 60); textSize(11); noStroke(); textAlign(CENTER, BOTTOM);
    text('A', AX, TOP_Y - 5);
    text('B', BX, TOP_Y - 5);

    if (stage <= 2) drawOriginalCircuit();
    else            drawSimplifiedCircuit();

    if (stage === 2) drawParallelHighlight();
    if (stage === 3) drawR23Highlight();
    if (stage >= 4)  drawRtotalAnnotation();
    if (stage >= 5)  drawCurrentAnnotation();
    if (stage >= 6)  drawVoltageAnnotations();
}

// ── Original: R1 — [R2∥R3] — R4 ──────────────────────────
function drawOriginalCircuit() {
    // Wires
    wire(BAT_CX, TOP_Y, R1_XL,  TOP_Y);   // top-left to R1
    wire(AX,     TOP_Y, AX,     PAR_Y);    // Node A vertical drop
    wire(BX,     PAR_Y, BX,     TOP_Y);    // Node B vertical rise
    wire(RC_X,   TOP_Y, RC_X,   BOT_Y);    // right corner
    wire(BAT_CX, BOT_Y, RC_X,   BOT_Y);   // bottom rail

    // Resistors
    drawResH(R1_XL,  TOP_Y - RH_H/2, R1_XR - R1_XL, RH_H, 'R1 = '+fmtR(R1v), true,  [130, 30, 30]);
    drawResH(AX,     TOP_Y - RH_H/2, PAR_XR - AX,   RH_H, 'R2 = '+fmtR(R2v), true,  [180, 90,  0]);
    drawResH(AX,     PAR_Y - RH_H/2, PAR_XR - AX,   RH_H, 'R3 = '+fmtR(R3v), false, [180, 90,  0]);
    drawResH(BX,     TOP_Y - RH_H/2, R4_XR  - BX,   RH_H, 'R4 = '+fmtR(R4v), true,  [40,  40, 180]);

    drawBatterySchematic(BAT_CX, BAT_CY, BAT_H);
    jdots();
}

// ── Simplified: R1 — R23 — R4 all series ──────────────────
function drawSimplifiedCircuit() {
    const spd = constrain(I_total * 18, 0.003, 0.6);

    if (isAnimating && stage >= 5) {
        animWire(BAT_CX, TOP_Y, R1_XL,  TOP_Y, spd);
        animWire(R1_XL,  TOP_Y, AX,     TOP_Y, spd);
        animWire(AX,     TOP_Y, PAR_XR, TOP_Y, spd);
        animWire(PAR_XR, TOP_Y, RC_X,   TOP_Y, spd);
        animWire(RC_X,   TOP_Y, RC_X,   BOT_Y, spd);
        animWire(RC_X,   BOT_Y, BAT_CX, BOT_Y, spd);
        animWire(BAT_CX, BOT_Y, BAT_CX, BAT_CY + BAT_H/2, spd);
        animWire(BAT_CX, BAT_CY - BAT_H/2, BAT_CX, TOP_Y, spd);
    } else {
        wire(BAT_CX, TOP_Y, R1_XL, TOP_Y);
        wire(RC_X,   TOP_Y, RC_X,  BOT_Y);
        wire(BAT_CX, BOT_Y, RC_X,  BOT_Y);
    }

    drawResH(R1_XL, TOP_Y - RH_H/2, R1_XR - R1_XL, RH_H, 'R1 = '+fmtR(R1v),   true, [130, 30, 30]);
    drawResH(AX,    TOP_Y - RH_H/2, PAR_XR - AX,   RH_H, 'R23 = '+fmtR(R23),  true, [0, 130, 120]);
    drawResH(BX,    TOP_Y - RH_H/2, R4_XR  - BX,   RH_H, 'R4 = '+fmtR(R4v),   true, [40,  40, 180]);

    drawBatterySchematic(BAT_CX, BAT_CY, BAT_H);

    fill(20, 20, 20); noStroke();
    [BAT_CX, AX, BX, RC_X].forEach(x => { circle(x, TOP_Y, 7); circle(x, BOT_Y, 7); });
}

// ── Stage 2: dashed box around parallel group ─────────────
function drawParallelHighlight() {
    const bx = AX - 10, by = TOP_Y - 30;
    const bw = (PAR_XR - AX) + 20, bh = (PAR_Y - TOP_Y) + RH_H/2 + 24;
    noFill(); stroke(220, 120, 0); strokeWeight(2);
    drawingContext.setLineDash([7, 4]);
    rect(bx, by, bw, bh, 5);
    drawingContext.setLineDash([]);

    drawResH(AX, TOP_Y - RH_H/2, PAR_XR - AX, RH_H, 'R2 = '+fmtR(R2v), true,  [220, 120, 0]);
    drawResH(AX, PAR_Y - RH_H/2, PAR_XR - AX, RH_H, 'R3 = '+fmtR(R3v), false, [220, 120, 0]);

    noStroke(); fill(200, 90, 0); textSize(11); textStyle(BOLD); textAlign(CENTER, BOTTOM);
    text('PARALLEL GROUP  R2 ∥ R3', bx + bw/2, by - 3);
    textStyle(NORMAL);
}

// ── Stage 3: callout box showing R23 formula ──────────────
function drawR23Highlight() {
    const bx = AX - 10, by = TOP_Y - 32;
    const bw = (PAR_XR - AX) + 20, bh = 52;
    noFill(); stroke(0, 160, 140); strokeWeight(2);
    drawingContext.setLineDash([6, 4]);
    rect(bx, by, bw, bh, 5);
    drawingContext.setLineDash([]);

    fill(230, 250, 248); stroke(0, 160, 140); strokeWeight(1);
    rect(bx + 4, by + bh + 4, bw - 8, 46, 4);
    noStroke(); fill(0, 110, 100); textSize(10); textAlign(CENTER, TOP);
    text('(R2 × R3) / (R2 + R3)', bx + bw/2, by + bh + 8);
    text('= (' + fmtR(R2v) + ' × ' + fmtR(R3v) + ')', bx + bw/2, by + bh + 20);
    text('/ (' + fmtR(R2v) + ' + ' + fmtR(R3v) + ')', bx + bw/2, by + bh + 31);
    fill(0, 120, 110); textStyle(BOLD);
    text('R23 = ' + fmtR(R23), bx + bw/2, by + bh + 42);
    textStyle(NORMAL);
}

// ── Stage 4+: Rtotal annotation ───────────────────────────
function drawRtotalAnnotation() {
    noStroke(); fill(80, 20, 140); textSize(10); textStyle(BOLD); textAlign(CENTER, BOTTOM);
    text('R_total = R1 + R23 + R4 = ' + fmtR(R1v) + ' + ' + fmtR(R23) + ' + ' + fmtR(R4v) + ' = ' + fmtR(R_total),
         PANEL_X / 2, TOP_Y - 36);
    textStyle(NORMAL);
}

// ── Stage 5+: current arrow ───────────────────────────────
function drawCurrentAnnotation() {
    const ax = (BAT_CX + RC_X) / 2, ay = BOT_Y + 13;
    fill(30, 100, 30); noStroke();
    triangle(ax + 12, ay - 4, ax - 2, ay, ax + 12, ay + 4);
    textSize(11); textStyle(BOLD); textAlign(RIGHT, CENTER);
    text('I = ' + fmtI(I_total), ax + 16, ay + 1);
    textStyle(NORMAL);
}

// ── Stage 6: voltage drops + branch current callout ───────
function drawVoltageAnnotations() {
    noStroke(); textSize(11); textStyle(BOLD); textAlign(CENTER, TOP);
    fill(130, 30, 30);
    text('V1='+fmtV(V1), (R1_XL + R1_XR)/2, TOP_Y + 5);
    fill(0, 110, 100);
    text('V23='+fmtV(V23), (AX + PAR_XR)/2, TOP_Y + 5);
    fill(40, 40, 180);
    text('V4='+fmtV(V4), (BX + R4_XR)/2, TOP_Y + 5);
    textStyle(NORMAL);

    const bx = AX - 5, by = BOT_Y + 28, bw = PAR_XR - AX + 10, bh = 62;
    fill(240, 248, 240); stroke(0, 140, 80); strokeWeight(1);
    rect(bx, by, bw, bh, 4);
    noStroke(); fill(0, 100, 60); textSize(10); textAlign(LEFT, TOP);
    text('Branch currents (V23 = '+fmtV(V23)+'):', bx + 5, by + 4);
    text('I2 = V23/R2 = ' + fmtI(I2), bx + 5, by + 18);
    text('I3 = V23/R3 = ' + fmtI(I3), bx + 5, by + 31);
    textStyle(BOLD);
    text('I2+I3 = '+fmtI(I2+I3)+'  ✓', bx + 5, by + 46);
    textStyle(NORMAL);
}

// ── Junction dots (original circuit) ─────────────────────
function jdots() {
    fill(20, 20, 20); noStroke();
    [BAT_CX, RC_X].forEach(x => { circle(x, TOP_Y, 7); circle(x, BOT_Y, 7); });
    circle(AX, TOP_Y, 7); circle(AX, PAR_Y, 7);
    circle(BX, TOP_Y, 7); circle(BX, PAR_Y, 7);
}

// ============================================================
// DRAWING PRIMITIVES
// ============================================================

// Standard battery schematic (multi-cell plates)
function drawBatterySchematic(cx, cy, h) {
    const nCells = 3, cellH = h / nCells;
    const longL = 22, shortL = 13, gap = cellH * 0.45;

    fill(252, 252, 255); noStroke();
    rect(cx - longL - 4, cy - h/2 - 4, longL*2+8, h+8);

    stroke(40, 40, 40);
    for (let i = 0; i < nCells; i++) {
        const py1 = cy - h/2 + i * cellH + cellH/4;
        const py2 = py1 + gap;
        strokeWeight(3);   line(cx - longL, py1, cx + longL, py1);
        strokeWeight(1.5); line(cx - shortL, py2, cx + shortL, py2);
    }

    // Lead wires
    stroke(30, 30, 30); strokeWeight(LW);
    line(cx, TOP_Y, cx, cy - h/2);
    line(cx, cy + h/2, cx, BOT_Y);

    noStroke(); fill(0, 130, 0);
    textSize(14); textStyle(BOLD); textAlign(CENTER, CENTER);
    text('+', cx, cy - h/2 - 12);
    text('−', cx, cy + h/2 + 12);
    textStyle(NORMAL);

    fill(20, 60, 160); textSize(12); textStyle(BOLD); textAlign(RIGHT, CENTER);
    text('Vs =', cx - longL - 8, cy - 8);
    textStyle(NORMAL);
    text(fmtV(Vs), cx - longL - 8, cy + 10);
}

// Horizontal zigzag resistor
function drawResH(x, y, w, h, label, above, col) {
    const cy = y + h/2, peaks = 6;
    const ew = w * 0.15, pw = (w - 2*ew)/peaks, ph = h * 0.38;
    const [r, g, b] = col;

    fill(252, 252, 255); noStroke();
    rect(x + ew, cy - ph - 1, w - 2*ew, ph*2 + 2);

    stroke(r, g, b); strokeWeight(LW); noFill();
    line(x, cy, x + ew, cy);
    line(x + w - ew, cy, x + w, cy);
    beginShape(); noFill(); vertex(x + ew, cy);
    for (let i = 0; i < peaks; i++) {
        vertex(x + ew + (i+0.5)*pw, (i%2===0) ? cy - ph : cy + ph);
    }
    vertex(x + w - ew, cy);
    endShape();

    noStroke(); fill(r, g, b); textSize(11); textStyle(BOLD);
    textAlign(CENTER, above ? BOTTOM : TOP);
    text(label, x + w/2, above ? cy - ph - 3 : cy + ph + 3);
    textStyle(NORMAL);
}

// Plain static wire
function wire(x1, y1, x2, y2) {
    stroke(30, 30, 30); strokeWeight(LW); line(x1, y1, x2, y2);
}

// Animated wire with electron dots
function animWire(x1, y1, x2, y2, spd) {
    stroke(30, 30, 30); strokeWeight(LW); line(x1, y1, x2, y2);
    const d = sqrt((x2-x1)**2 + (y2-y1)**2);
    const count = max(1, floor(d/28));
    const t = (animTime * spd * 0.001) % 1;
    fill(220, 50, 20); noStroke();
    for (let i = 0; i < count; i++) {
        const f = ((i/count) + t) % 1;
        circle(lerp(x1, x2, f), lerp(y1, y2, f), 7);
    }
}

// ============================================================
// LOG PANEL
// ============================================================
function drawLogPanel() {
    const pw = CW - PANEL_X, lx = PANEL_X + 10, lw = pw - 16;

    fill(233, 237, 252); noStroke(); rect(PANEL_X, 0, pw, circuitH, 0, 8, 8, 0);
    fill(50, 70, 160); noStroke(); rect(PANEL_X, 0, pw, 26, 0, 8, 0, 0);
    fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
    text('SOLUTION LOG — Stage ' + stage + '/' + NSTAGE, PANEL_X + pw/2, 13);
    textStyle(NORMAL);

    let y = 34;
    pLabel('CIRCUIT VALUES', lx, y); y += 14;
    pRow('Vs  = '+fmtV(Vs),  lx, y, [20,  60, 160]); y += 14;
    pRow('R1  = '+fmtR(R1v), lx, y, [130, 30,  30]); y += 14;
    pRow('R2  = '+fmtR(R2v), lx, y, [180, 90,   0]); y += 14;
    pRow('R3  = '+fmtR(R3v), lx, y, [180, 90,   0]); y += 14;
    pRow('R4  = '+fmtR(R4v), lx, y, [40,  40, 180]); y += 18;

    if (stage < 2) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('STEP 1: IDENTIFY PARALLEL', lx, y); y += 14;
    pRow('R2 ∥ R3 → can be reduced', lx, y, [180, 90, 0]); y += 18;

    if (stage < 3) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('STEP 2: REDUCE R2 ∥ R3', lx, y); y += 14;
    pRow('R23 = R2·R3 / (R2+R3)', lx, y, [50, 50, 50]); y += 14;
    pRow('    = ('+fmtR(R2v)+' × '+fmtR(R3v)+')', lx+4, y, [60,60,60]); y += 14;
    pRow('    / ('+fmtR(R2v)+' + '+fmtR(R3v)+')', lx+4, y, [60,60,60]); y += 14;
    noStroke(); fill(0,120,100); textSize(11); textStyle(BOLD); textAlign(LEFT,TOP);
    text('R23 = '+fmtR(R23), lx, y); textStyle(NORMAL); y += 18;

    if (stage < 4) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('STEP 3: TOTAL RESISTANCE', lx, y); y += 14;
    pRow('R_tot = R1 + R23 + R4', lx, y, [50,50,50]); y += 14;
    pRow('     = '+fmtR(R1v)+' + '+fmtR(R23)+' + '+fmtR(R4v), lx+4, y, [50,50,50]); y += 14;
    noStroke(); fill(80,20,140); textSize(11); textStyle(BOLD); textAlign(LEFT,TOP);
    text('R_tot = '+fmtR(R_total), lx, y); textStyle(NORMAL); y += 18;

    if (stage < 5) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('STEP 4: TOTAL CURRENT', lx, y); y += 14;
    pRow('I = Vs / R_tot', lx, y, [50,50,50]); y += 14;
    pRow('  = '+fmtV(Vs)+' / '+fmtR(R_total), lx+4, y, [50,50,50]); y += 14;
    fill(190,55,10); noStroke(); rect(lx, y, lw, 18, 3);
    fill(255); textSize(11); textStyle(BOLD); textAlign(LEFT,TOP);
    text('I = '+fmtI(I_total), lx+4, y+2); textStyle(NORMAL); y += 22;

    if (stage < 6) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('STEP 5: WORK BACKWARD', lx, y); y += 14;
    pRow('V_R1  = I·R1  = '+fmtV(V1),  lx, y, [130, 30, 30]); y += 14;
    pRow('V_R23 = I·R23 = '+fmtV(V23), lx, y, [0, 100, 90]);  y += 14;
    pRow('V_R4  = I·R4  = '+fmtV(V4),  lx, y, [40, 40, 180]); y += 14;
    const vsum = V1 + V23 + V4, ok = abs(vsum - Vs) < 0.001;
    fill(ok ? color(0,140,0) : color(200,0,0)); noStroke(); rect(lx, y, lw, 18, 3);
    fill(255); textSize(11); textStyle(BOLD); textAlign(LEFT,TOP);
    text('V1+V23+V4 = '+fmtV(vsum)+(ok ? '  ✓' : '  !'), lx+4, y+2);
    textStyle(NORMAL); y += 22;

    pDiv(lx, y, lw); y += 10;
    pLabel('BRANCH CURRENTS', lx, y); y += 14;
    pRow('I2 = V23/R2 = '+fmtI(I2), lx, y, [180, 90, 0]); y += 14;
    pRow('I3 = V23/R3 = '+fmtI(I3), lx, y, [180, 90, 0]); y += 14;
    noStroke(); fill(0,130,60); textSize(11); textStyle(BOLD); textAlign(LEFT,TOP);
    text('I2+I3 = '+fmtI(I2+I3)+'  ✓', lx, y);
    textStyle(NORMAL);
}

function pLabel(t, x, y) {
    noStroke(); fill(0,100,0); textSize(10); textStyle(BOLD); textAlign(LEFT,TOP);
    text(t, x, y); textStyle(NORMAL);
}
function pRow(t, x, y, c) {
    noStroke(); fill(c[0],c[1],c[2]); textSize(11); textAlign(LEFT,TOP); text(t, x, y);
}
function pDiv(x, y, w) {
    stroke(175,180,215); strokeWeight(1); line(x, y, x+w, y);
}

// ============================================================
// CONTROLS
// ============================================================
function drawControls() {
    fill(218, 224, 240); noStroke(); rect(0, circuitH, CW, controlH, 0, 0, 8, 8);

    drawBtn(PREV_B, '◀ Prev', stage > 1 ? [70,90,175] : [150,155,180]);
    noStroke(); fill(25,35,100); textSize(12); textStyle(BOLD); textAlign(CENTER,CENTER);
    text('Stage '+stage+'/'+NSTAGE, (PREV_B.x+PREV_B.w+NEXT_B.x)/2, BY+PREV_B.h/2);
    textStyle(NORMAL);
    drawBtn(NEXT_B, 'Next ▶', stage < NSTAGE ? [70,90,175] : [150,155,180]);
    drawBtn(ANIM_B, isAnimating ? '■ Stop' : '▶ Animate (Stage 5+)', isAnimating ? [150,50,50] : [50,125,55]);
    drawBtn(RSET_B, '↺ Reset', [100,105,135]);

    drawSliderCtrl('Source Vs:', Vs,  SL_VS, fmtV(Vs));
    drawSliderCtrl('R1:',       R1v, SL_R1, fmtR(R1v));
    drawSliderCtrl('R2:',       R2v, SL_R2, fmtR(R2v));
    drawSliderCtrl('R3:',       R3v, SL_R3, fmtR(R3v));
    drawSliderCtrl('R4:',       R4v, SL_R4, fmtR(R4v));
}

function drawBtn(b, lbl, col) {
    fill(col[0],col[1],col[2]); noStroke(); rect(b.x, b.y, b.w, b.h, 5);
    fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER,CENTER);
    text(lbl, b.x+b.w/2, b.y+b.h/2); textStyle(NORMAL);
}

function drawSliderCtrl(label, val, cy, dispVal) {
    const s = SLIDER_DEFS.find(d => d.cy === cy);
    const t = (val - s.mn) / (s.mx - s.mn), tx = SL_X + SL_W * t;
    noStroke(); fill(35,45,100); textSize(11); textAlign(RIGHT,CENTER);
    text(label+'  '+dispVal, SL_X - 8, cy);
    fill(178,183,210); noStroke(); rect(SL_X, cy-4, SL_W, 8, 4);
    fill(70,110,200); rect(SL_X, cy-4, SL_W*t, 8, 4);
    fill(255); stroke(75,110,200); strokeWeight(2); circle(tx, cy, 18);
}

// ============================================================
// INPUT
// ============================================================
function mousePressed() {
    if (inBtn(PREV_B) && stage > 1)      { stage--; return; }
    if (inBtn(NEXT_B) && stage < NSTAGE) { stage++; return; }
    if (inBtn(ANIM_B)) { isAnimating = !isAnimating; return; }
    if (inBtn(RSET_B)) {
        Vs=24; R1v=2000; R2v=6000; R3v=3000; R4v=1000;
        stage=1; isAnimating=false; animTime=0;
        recalculate(); return;
    }
    startDrag();
}
function mouseDragged() { if (dragSlider) applyDrag(); }
function mouseReleased() { dragSlider = null; }

function inBtn(b) {
    return mouseX >= b.x && mouseX <= b.x+b.w && mouseY >= b.y && mouseY <= b.y+b.h;
}
function startDrag() {
    for (const s of SLIDER_DEFS) {
        if (mouseX >= SL_X-12 && mouseX <= SL_X+SL_W+12 &&
            mouseY >= s.cy-14  && mouseY <= s.cy+14) {
            dragSlider = s.key; applyDrag(); return;
        }
    }
}
function applyDrag() {
    const s = SLIDER_DEFS.find(d => d.key === dragSlider);
    if (!s) return;
    const t = constrain((mouseX - SL_X) / SL_W, 0, 1);
    const raw = s.mn + t * (s.mx - s.mn);
    if (s.key === 'vs') {
        Vs = round(raw * 10) / 10;
    } else {
        const step = s.mx > 5000 ? 200 : 100;
        const r = constrain(round(raw/step)*step, s.mn, s.mx);
        if (s.key === 'r1') R1v = r;
        if (s.key === 'r2') R2v = r;
        if (s.key === 'r3') R3v = r;
        if (s.key === 'r4') R4v = r;
    }
    recalculate();
}
</script>
