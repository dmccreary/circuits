<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNR and Noise Floor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  body { margin: 0; background: #f0f0f0; display: flex; justify-content: center; }
</style>
</head>
<body>
<script>
const CW = 720, CH = 540;

// Spectrum plot
const PX = 60, PY = 48, PW = 620, PH = 270;
const CTRL_Y = PY + PH + 30;

// Parameters
let sliders = [
  { label: "Signal Level (dBFS):",  min: -80, max:  0, step: 1, val: -20, y: 0 },
  { label: "Noise Floor (dBFS):",   min: -120, max: -40, step: 1, val: -80, y: 0 },
  { label: "Signal Freq (kHz):",    min: 1,   max: 20, step: 1, val: 5,   y: 0 },
  { label: "Harmonics:",            min: 0,   max: 5,  step: 1, val: 3,   y: 0 },
];
const SL_X = 230, SL_W = 380;
let draggingSlider = -1;

let noiseData = [];
const N_NOISE = 200;

function setup() {
  createCanvas(CW, CH);
  textFont('Arial');
  regenerateNoise();
}

function regenerateNoise() {
  noiseData = [];
  for (let i = 0; i < N_NOISE; i++) noiseData.push(randomGaussian(0, 1));
}

function snr() {
  let sig = sliders[0].val, nfl = sliders[1].val;
  return sig - nfl;
}

function dbToY(db) {
  return PY + map(db, 0, -120, 0, PH);
}

function freqToX(khz) {
  return PX + map(khz, 0, 22, 0, PW);
}

function drawPlot() {
  fill(255); stroke(200); strokeWeight(1);
  rect(PX, PY, PW, PH);

  let sigDb  = sliders[0].val;
  let nflDb  = sliders[1].val;
  let sigKhz = sliders[2].val;
  let nHarm  = sliders[3].val;

  // dB grid
  textSize(9); textAlign(RIGHT, CENTER); noStroke();
  for (let db = 0; db >= -120; db -= 10) {
    let y = dbToY(db);
    stroke(db === 0 ? color(160) : color(235));
    strokeWeight(db === 0 ? 1.5 : 1);
    line(PX, y, PX + PW, y);
    noStroke(); fill(100);
    text(db + " dBFS", PX - 4, y);
  }

  // Freq grid
  textAlign(CENTER, TOP);
  for (let k = 0; k <= 20; k += 5) {
    let x = freqToX(k);
    stroke(235); strokeWeight(1);
    line(x, PY, x, PY + PH);
    noStroke(); fill(100); textSize(9);
    text(k + "k", x, PY + PH + 4);
  }

  // Noise floor band
  noStroke();
  fill(200, 60, 60, 30);
  rect(PX, dbToY(nflDb + 8), PW, PH - (dbToY(nflDb + 8) - PY));

  // Noise floor line
  stroke(200, 60, 60); strokeWeight(1.5); setLineDash([5, 4]);
  line(PX, dbToY(nflDb), PX + PW, dbToY(nflDb));
  setLineDash([]);
  noStroke(); fill(200, 60, 60); textSize(10); textAlign(LEFT, BOTTOM);
  text("Noise Floor: " + nflDb + " dBFS", PX + 5, dbToY(nflDb) - 2);

  // Noise (random spikes near noise floor)
  stroke(180, 100, 100); strokeWeight(1); noFill();
  for (let i = 0; i < N_NOISE; i++) {
    let khz = map(i, 0, N_NOISE, 0.2, 21.8);
    let db = nflDb + noiseData[i] * 3 + random(-1, 1);
    let x = freqToX(khz);
    let y1 = dbToY(db);
    let y2 = dbToY(nflDb + 12);
    if (y1 < y2) line(x, y1, x, min(y2, PY + PH));
  }

  // Signal peak + harmonics
  let harmColors = [
    color(60, 100, 220),
    color(90, 62, 237),
    color(120, 40, 200),
    color(150, 20, 180),
    color(180, 0, 160),
  ];
  for (let h = 0; h <= nHarm; h++) {
    let khz = sigKhz * (h + 1);
    if (khz > 21) break;
    let db = (h === 0) ? sigDb : (sigDb - 20 - h * 12);
    db = max(db, nflDb - 2);
    let x = freqToX(khz);
    let colH = harmColors[min(h, harmColors.length - 1)];
    // Bar
    stroke(colH); strokeWeight(h === 0 ? 3 : 2);
    line(x, dbToY(db), x, PY + PH);
    // Label
    if (h === 0) {
      noStroke(); fill(colH); textSize(10); textAlign(CENTER, BOTTOM);
      text("Signal\n" + db + " dBFS", x, dbToY(db) - 2);
    } else if (db > nflDb + 5) {
      noStroke(); fill(colH); textSize(8); textAlign(CENTER, BOTTOM);
      text("H" + (h + 1), x, dbToY(db) - 2);
    }
  }

  // SNR annotation
  let snrVal = snr();
  let sigY = dbToY(sigDb), nflY = dbToY(nflDb);
  stroke(40, 180, 40); strokeWeight(1.5);
  let annX = PX + PW - 40;
  line(annX, sigY, annX, nflY);
  line(annX - 5, sigY, annX + 5, sigY);
  line(annX - 5, nflY, annX + 5, nflY);
  noStroke(); fill(20, 140, 20); textSize(11); textAlign(RIGHT, CENTER); textStyle(BOLD);
  text("SNR = " + snrVal.toFixed(0) + " dB", annX - 8, (sigY + nflY) / 2);
  textStyle(NORMAL);

  // Axes
  noStroke(); fill(50); textSize(11); textAlign(CENTER, TOP);
  text("Frequency (Hz)", PX + PW / 2, PY + PH + 18);
  push(); translate(14, PY + PH / 2); rotate(-HALF_PI);
  textAlign(CENTER, CENTER); text("Level (dBFS)", 0, 0); pop();

  noStroke(); fill(50); textSize(13); textAlign(CENTER, TOP); textStyle(BOLD);
  text("Audio Spectrum — Signal vs Noise Floor", PX + PW / 2, PY - 28);
  textStyle(NORMAL);
}

function drawControls() {
  fill(245); stroke(210); strokeWeight(1);
  rect(0, CTRL_Y - 14, CW, CH - CTRL_Y + 14);

  noStroke(); fill(40); textSize(13); textAlign(CENTER, TOP); textStyle(BOLD);
  text("Signal and Noise Parameters", CW / 2, CTRL_Y - 4);
  textStyle(NORMAL);

  for (let i = 0; i < sliders.length; i++) {
    let sl = sliders[i];
    sl.y = CTRL_Y + 26 + i * 44;
    let thumbX = SL_X + map(sl.val, sl.min, sl.max, 0, SL_W);

    // Track
    fill(210); noStroke(); rect(SL_X, sl.y - 3, SL_W, 6, 3);
    // Fill color: green for signal, red for noise, purple for others
    let col = (i === 0) ? color(40, 160, 40) : (i === 1) ? color(200, 60, 60) : color(90, 62, 237);
    fill(col); rect(SL_X, sl.y - 3, thumbX - SL_X, 6, 3);
    // Thumb
    fill(255); stroke(140); strokeWeight(1.5); circle(thumbX, sl.y, 18);
    // Label
    noStroke(); fill(40); textSize(12); textAlign(RIGHT, CENTER);
    text(sl.label + " " + sl.val + (i < 2 ? " dB" : i === 2 ? " kHz" : ""), SL_X - 8, sl.y);
  }

  // SNR quality indicator
  let snrVal = snr();
  let qCol = snrVal > 60 ? color(20,160,20) : snrVal > 40 ? color(180,140,0) : color(200,60,60);
  let qLabel = snrVal > 60 ? "Excellent" : snrVal > 40 ? "Good" : snrVal > 20 ? "Fair" : "Poor";
  noStroke(); fill(qCol); textSize(13); textAlign(CENTER, TOP); textStyle(BOLD);
  text("SNR: " + snrVal.toFixed(0) + " dB — " + qLabel, CW / 2, CTRL_Y + 26 + 4 * 44 + 4);
  textStyle(NORMAL);
}

function setLineDash(list) {
  drawingContext.setLineDash(list);
}

function draw() {
  background(240);
  drawPlot();
  drawControls();
}

function mousePressed() {
  for (let i = 0; i < sliders.length; i++) {
    let sl = sliders[i];
    if (abs(mouseY - sl.y) < 16 && mouseX >= SL_X - 10 && mouseX <= SL_X + SL_W + 10) {
      draggingSlider = i;
    }
  }
}

function mouseDragged() {
  if (draggingSlider < 0) return;
  let sl = sliders[draggingSlider];
  let raw = map(mouseX, SL_X, SL_X + SL_W, sl.min, sl.max);
  let steps = round((raw - sl.min) / sl.step);
  sl.val = constrain(sl.min + steps * sl.step, sl.min, sl.max);
}

function mouseReleased() {
  draggingSlider = -1;
  regenerateNoise();
}
</script>
</body>
</html>
