<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Parallel Circuit Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
<style>
  body { margin: 0; padding: 0; background: #e8eaf0; }
  canvas { display: block; }
</style>
</head>
<body>
<main></main>
<script>
// ============================================================
// Parallel Circuit Analysis MicroSim
// Chapter 2: Ohm's Law and Basic Circuit Configurations
// Self-contained: inline vertical zigzag resistors + battery
// Wire thickness proportional to branch current
// ============================================================

const CW       = 720;
const circuitH = 400;
const controlH = 140;
const CH       = circuitH + controlH;
const PANEL_X  = 445;

// ── Circuit geometry ──────────────────────────────────────
const TOP_Y = 75;     // top bus y
const BOT_Y = 335;    // bottom bus y
const BAT_X = 82;     // left-side x
const BAT_CY = (TOP_Y + BOT_Y) / 2;   // 205
const BAT_H  = 72;

// Three branch x-positions
const B1X = 196;
const B2X = 300;
const B3X = 404;

// Vertical resistors — centred between buses
const RW = 40, RH = 110;
const R_TOP = BAT_CY - RH / 2;
const R_BOT = BAT_CY + RH / 2;

// ── Circuit values ────────────────────────────────────────
let Vs  = 12;
let R1v = 1000;
let R2v = 2000;
let R3v = 3000;
let I1, I2, I3, I_total, Req;

function recalculate() {
    I1      = Vs / R1v;
    I2      = Vs / R2v;
    I3      = Vs / R3v;
    I_total = I1 + I2 + I3;
    Req     = Vs / I_total;
}

// ── Stage & animation ─────────────────────────────────────
let stage      = 1;
const NSTAGE   = 5;
let isAnimating = false;
let animTime   = 0;

// ── Slider layout ─────────────────────────────────────────
const SL_LM = 280;
const SL_X  = SL_LM;
const SL_W  = CW - SL_LM - 20;
const SL_VS = circuitH + 42;
const SL_R1 = circuitH + 70;
const SL_R2 = circuitH + 98;
const SL_R3 = circuitH + 126;

// ── Buttons ───────────────────────────────────────────────
const BY     = circuitH + 8;
const PREV_B = { x: 10,  y: BY, w: 90,  h: 26 };
const NEXT_B = { x: 165, y: BY, w: 90,  h: 26 };
const ANIM_B = { x: 380, y: BY, w: 130, h: 26 };
const RSET_B = { x: 520, y: BY, w: 80,  h: 26 };

let dragSlider = null;
const SLIDER_DEFS = [
    { key: 'vs', cy: SL_VS, mn: 1,   mx: 20   },
    { key: 'r1', cy: SL_R1, mn: 200, mx: 5000 },
    { key: 'r2', cy: SL_R2, mn: 200, mx: 5000 },
    { key: 'r3', cy: SL_R3, mn: 200, mx: 5000 },
];

// ── Format helpers ────────────────────────────────────────
function fmtV(v)  { return v.toFixed(2) + ' V'; }
function fmtI(v)  { return (v * 1000).toFixed(2) + ' mA'; }
function fmtR(v)  { return v >= 1000 ? (v / 1000).toFixed(2).replace(/\.?0+$/, '') + ' kΩ' : v.toFixed(0) + ' Ω'; }

// ============================================================
// SETUP & DRAW
// ============================================================
function setup() {
    createCanvas(CW, CH).parent(select('main').elt);
    textFont('Arial');
    recalculate();
}

function draw() {
    if (isAnimating) animTime += deltaTime;
    background(232, 234, 240);
    drawSchematic();
    drawInfoPanel();
    drawControls();
}

// ============================================================
// SCHEMATIC
// ============================================================
function drawSchematic() {
    fill(252, 252, 255);
    noStroke();
    rect(0, 0, PANEL_X, circuitH, 8, 0, 0, 8);

    fill(20, 30, 80);
    textSize(14); textStyle(BOLD); textAlign(CENTER, TOP);
    text('Parallel Circuit', PANEL_X / 2, 8);
    textStyle(NORMAL);

    // ── Buses and branch wires ────────────────────────────
    // Top bus: full current from battery to B1, decreasing after each branch
    drawCurrentWire(BAT_X, TOP_Y, B1X,   TOP_Y, I_total);
    drawCurrentWire(B1X,   TOP_Y, B2X,   TOP_Y, I2 + I3);
    drawCurrentWire(B2X,   TOP_Y, B3X,   TOP_Y, I3);
    // Top bus extension past last branch
    drawCurrentWire(B3X,   TOP_Y, B3X + 20, TOP_Y, 0.000001);

    // Bottom bus: current merges right→left
    drawCurrentWire(B3X + 20, BOT_Y, B3X, BOT_Y, 0.000001);
    drawCurrentWire(B3X,  BOT_Y, B2X,    BOT_Y, I3);
    drawCurrentWire(B2X,  BOT_Y, B1X,    BOT_Y, I2 + I3);
    drawCurrentWire(B1X,  BOT_Y, BAT_X,  BOT_Y, I_total);

    // Branch wires (just the stub above/below each resistor)
    drawCurrentWire(B1X, TOP_Y, B1X, R_TOP, I1);
    drawCurrentWire(B1X, R_BOT, B1X, BOT_Y, I1);
    drawCurrentWire(B2X, TOP_Y, B2X, R_TOP, I2);
    drawCurrentWire(B2X, R_BOT, B2X, BOT_Y, I2);
    drawCurrentWire(B3X, TOP_Y, B3X, R_TOP, I3);
    drawCurrentWire(B3X, R_BOT, B3X, BOT_Y, I3);

    // ── Battery lead wires ────────────────────────────────
    stroke(30, 30, 30); strokeWeight(3);
    line(BAT_X, TOP_Y, BAT_X, BAT_CY - BAT_H / 2);
    line(BAT_X, BAT_CY + BAT_H / 2, BAT_X, BOT_Y);

    // ── Battery schematic symbol ──────────────────────────
    drawBatterySchematic(BAT_X, BAT_CY, BAT_H);

    // ── Resistors ─────────────────────────────────────────
    drawResistorV(B1X - RW / 2, R_TOP, RW, RH, 'R1=' + fmtR(R1v), [180, 50, 10]);
    drawResistorV(B2X - RW / 2, R_TOP, RW, RH, 'R2=' + fmtR(R2v), [10, 120, 40]);
    drawResistorV(B3X - RW / 2, R_TOP, RW, RH, 'R3=' + fmtR(R3v), [70, 20, 180]);

    // ── Junction dots ─────────────────────────────────────
    fill(20, 20, 20); noStroke();
    [B1X, B2X, B3X].forEach(bx => {
        circle(bx, TOP_Y, 8);
        circle(bx, BOT_Y, 8);
    });
    circle(BAT_X, TOP_Y, 8);
    circle(BAT_X, BOT_Y, 8);

    // ── Stage overlays ────────────────────────────────────
    if (stage >= 1) drawVoltageLabels();
    if (stage >= 2) drawCurrentLabels();
    if (stage >= 3) drawTotalArrow();
}

// ── Schematic battery (multi-cell plates) ─────────────────
function drawBatterySchematic(cx, cy, h) {
    const nCells = 3;
    const cellH  = h / nCells;
    const longL  = 22;
    const shortL = 13;
    const gap    = cellH * 0.45;

    fill(252, 252, 255); noStroke();
    rect(cx - longL - 4, cy - h / 2 - 4, longL * 2 + 8, h + 8);

    stroke(40, 40, 40);
    for (let i = 0; i < nCells; i++) {
        const py1 = cy - h / 2 + i * cellH + cellH / 4;
        const py2 = py1 + gap;
        strokeWeight(3);
        line(cx - longL, py1, cx + longL, py1);   // long (positive)
        strokeWeight(1.5);
        line(cx - shortL, py2, cx + shortL, py2); // short (negative)
    }

    noStroke(); fill(0, 130, 0);
    textSize(14); textStyle(BOLD); textAlign(CENTER, CENTER);
    text('+', cx, cy - h / 2 - 12);
    text('−', cx, cy + h / 2 + 12);
    textStyle(NORMAL);

    fill(20, 60, 160); textSize(12); textStyle(BOLD);
    textAlign(RIGHT, CENTER);
    text('Vs =', cx - longL - 8, cy - 8);
    textStyle(NORMAL);
    text(fmtV(Vs), cx - longL - 8, cy + 10);
}

// ── Vertical zigzag resistor ───────────────────────────────
function drawResistorV(x, y, w, h, label, col) {
    const cx      = x + w / 2;
    const peaks   = 6;
    const wireEnd = h * 0.12;
    const zigH    = (h - 2 * wireEnd) / peaks;
    const zigW    = w * 0.42;

    fill(252, 252, 255); noStroke();
    rect(cx - zigW - 1, y + wireEnd, zigW * 2 + 2, h - 2 * wireEnd);

    stroke(30, 30, 30); strokeWeight(2.5); noFill();
    line(cx, y,     cx, y + wireEnd);
    line(cx, y + h - wireEnd, cx, y + h);

    beginShape(); noFill();
    vertex(cx, y + wireEnd);
    for (let i = 0; i < peaks; i++) {
        const yb = y + wireEnd + i * zigH;
        vertex(cx - zigW, yb + zigH / 2);
        vertex(cx + zigW, yb + zigH);
    }
    endShape();
    line(cx + zigW, y + wireEnd + peaks * zigH, cx, y + h - wireEnd);

    noStroke();
    fill(col[0], col[1], col[2]);
    textSize(11); textStyle(BOLD); textAlign(RIGHT, CENTER);
    text(label, cx - zigW - 6, y + h / 2);
    textStyle(NORMAL);
}

// ── Wire with thickness ∝ current, optionally animated ─────
function drawCurrentWire(x1, y1, x2, y2, current) {
    const frac = (I_total > 0) ? current / I_total : 0;
    const lw   = constrain(map(frac, 0, 1, 1.5, 5.5), 1.5, 5.5);

    if (isAnimating && current > 0.0001) {
        const spd = constrain(current * 20, 0.003, 0.6);
        drawAnimatedWire(x1, y1, x2, y2, spd, lw);
    } else {
        stroke(30, 30, 30);
        strokeWeight(lw);
        line(x1, y1, x2, y2);
    }
}

// ── Animated wire (moving dots, variable thickness) ────────
function drawAnimatedWire(x1, y1, x2, y2, spd, lw) {
    stroke(30, 30, 30); strokeWeight(lw);
    line(x1, y1, x2, y2);

    const d = sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
    const spacing = 28;
    const count   = max(1, floor(d / spacing));
    const t       = (animTime * spd * 0.001) % 1;

    fill(220, 50, 20); noStroke();
    for (let i = 0; i < count; i++) {
        const frac = ((i / count) + t) % 1;
        circle(lerp(x1, x2, frac), lerp(y1, y2, frac), max(5, lw + 2));
    }
}

function drawVoltageLabels() {
    noStroke(); fill(20, 60, 160);
    textSize(10); textAlign(CENTER, BOTTOM);
    [B1X, B2X, B3X].forEach(bx => {
        text(fmtV(Vs), bx, R_TOP - 6);
        fill(90, 110, 160);
        text('= Vs', bx, R_TOP - 17);
        fill(20, 60, 160);
    });
}

function drawCurrentLabels() {
    noStroke(); textSize(11); textStyle(BOLD);
    const labels = [
        { x: B1X, i: I1, col: [180, 50, 10] },
        { x: B2X, i: I2, col: [10, 120, 40] },
        { x: B3X, i: I3, col: [70, 20, 180] },
    ];
    labels.forEach(({ x, i, col }, idx) => {
        fill(col[0], col[1], col[2]);
        textAlign(LEFT, CENTER);
        text('I' + (idx + 1) + ' = ' + fmtI(i), x + zigWFor(RW) + 8, BAT_CY + (idx - 1) * 16);
    });
    textStyle(NORMAL);
}

function zigWFor(w) { return w * 0.42; }

function drawTotalArrow() {
    const ax = BAT_X + 10, ay = TOP_Y - 12;
    fill(30, 30, 30); noStroke();
    triangle(ax, ay - 5, ax + 14, ay, ax, ay + 5);
    textSize(10); textAlign(LEFT, CENTER);
    fill(30, 30, 30);
    text('I_total = ' + fmtI(I_total), ax + 17, ay);
}

// ============================================================
// INFO PANEL
// ============================================================
function drawInfoPanel() {
    const pw = CW - PANEL_X;
    const lx = PANEL_X + 10;
    const lw = pw - 16;

    fill(233, 237, 252); noStroke();
    rect(PANEL_X, 0, pw, circuitH, 0, 8, 8, 0);

    fill(50, 70, 160); noStroke();
    rect(PANEL_X, 0, pw, 26, 0, 8, 0, 0);
    fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
    text('ANALYSIS — Stage ' + stage + ' / ' + NSTAGE, PANEL_X + pw / 2, 13);
    textStyle(NORMAL);

    let y = 34;

    pLabel('GIVEN VALUES', lx, y); y += 14;
    pRow('Vs = ' + fmtV(Vs),  lx, y, [20,  60, 160]); y += 14;
    pRow('R1 = ' + fmtR(R1v), lx, y, [180, 50,  10]); y += 14;
    pRow('R2 = ' + fmtR(R2v), lx, y, [10, 120,  40]); y += 14;
    pRow('R3 = ' + fmtR(R3v), lx, y, [70,  20, 180]); y += 18;

    if (stage < 2) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('BRANCH CURRENTS  (I = Vs / R)', lx, y); y += 14;
    pRow('I1 = ' + fmtV(Vs) + '/' + fmtR(R1v) + ' = ' + fmtI(I1), lx, y, [180, 50, 10]); y += 14;
    pRow('I2 = ' + fmtV(Vs) + '/' + fmtR(R2v) + ' = ' + fmtI(I2), lx, y, [10, 120, 40]); y += 14;
    pRow('I3 = ' + fmtV(Vs) + '/' + fmtR(R3v) + ' = ' + fmtI(I3), lx, y, [70, 20, 180]); y += 18;

    if (stage < 3) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('TOTAL CURRENT  (KCL)', lx, y); y += 14;
    pRow('I_total = I1 + I2 + I3', lx, y, [50, 50, 50]); y += 14;
    pRow('= ' + fmtI(I1) + ' + ' + fmtI(I2), lx + 4, y, [50, 50, 50]); y += 14;
    pRow('  + ' + fmtI(I3), lx + 4, y, [50, 50, 50]); y += 14;
    fill(190, 55, 10); noStroke(); rect(lx, y, lw, 18, 3);
    fill(255); textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
    text('I_total = ' + fmtI(I_total), lx + 4, y + 2);
    textStyle(NORMAL); y += 22;

    if (stage < 4) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('EQUIVALENT RESISTANCE', lx, y); y += 14;
    pRow('1/Req = 1/R1 + 1/R2 + 1/R3', lx, y, [50, 50, 50]); y += 14;
    noStroke(); fill(0, 120, 0); textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
    text('Req = ' + fmtR(Req), lx, y);
    textStyle(NORMAL);
    fill(80, 80, 80); textSize(10); textAlign(LEFT, TOP);
    text('(< smallest branch R = ' + fmtR(min(R1v, R2v, R3v)) + ')', lx, y + 14);
    y += 32;

    if (stage < 5) return;
    pDiv(lx, y, lw); y += 10;
    pLabel('VERIFICATION  (Vs / Req = I_total)', lx, y); y += 14;
    pRow('= ' + fmtV(Vs) + ' / ' + fmtR(Req), lx + 4, y, [50, 50, 50]); y += 14;
    const verifyI = Vs / Req;
    const ok = abs(verifyI - I_total) < 0.0001;
    fill(ok ? color(0, 140, 0) : color(200, 0, 0));
    noStroke(); rect(lx, y, lw, 18, 3);
    fill(255); textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
    text('= ' + fmtI(verifyI) + ' = I_total  ' + (ok ? '✓' : '!'), lx + 4, y + 2);
    textStyle(NORMAL); y += 24;

    fill(230, 240, 255); stroke(100, 130, 200); strokeWeight(1);
    rect(lx, y, lw, 40, 3);
    noStroke(); fill(30, 50, 140); textSize(10); textAlign(CENTER, TOP);
    text('Key: voltage = Vs across all branches.', lx + lw / 2, y + 4);
    text('More current flows through less R.', lx + lw / 2, y + 18);
    text('Req < any single branch R.', lx + lw / 2, y + 32);
}

function pLabel(t, x, y) {
    noStroke(); fill(0, 100, 0); textSize(10); textStyle(BOLD); textAlign(LEFT, TOP);
    text(t, x, y); textStyle(NORMAL);
}
function pRow(t, x, y, c) {
    noStroke(); fill(c[0], c[1], c[2]); textSize(11); textAlign(LEFT, TOP); text(t, x, y);
}
function pDiv(x, y, w) {
    stroke(175, 180, 215); strokeWeight(1); line(x, y, x + w, y);
}

// ============================================================
// CONTROLS
// ============================================================
function drawControls() {
    fill(218, 224, 240); noStroke();
    rect(0, circuitH, CW, controlH, 0, 0, 8, 8);

    drawBtn(PREV_B, '◀ Prev', stage > 1 ? [70, 90, 175] : [150, 155, 180]);
    noStroke(); fill(25, 35, 100); textSize(12); textStyle(BOLD); textAlign(CENTER, CENTER);
    text('Stage ' + stage + '/' + NSTAGE, (PREV_B.x + PREV_B.w + NEXT_B.x) / 2, BY + PREV_B.h / 2);
    textStyle(NORMAL);
    drawBtn(NEXT_B, 'Next ▶', stage < NSTAGE ? [70, 90, 175] : [150, 155, 180]);
    drawBtn(ANIM_B, isAnimating ? '■ Stop' : '▶ Animate Current', isAnimating ? [150, 50, 50] : [50, 125, 55]);
    drawBtn(RSET_B, '↺ Reset', [100, 105, 135]);

    drawSliderCtrl('Source Vs:', Vs,  SL_VS, fmtV(Vs));
    drawSliderCtrl('R1:',       R1v, SL_R1, fmtR(R1v));
    drawSliderCtrl('R2:',       R2v, SL_R2, fmtR(R2v));
    drawSliderCtrl('R3:',       R3v, SL_R3, fmtR(R3v));
}

function drawBtn(b, lbl, col) {
    fill(col[0], col[1], col[2]); noStroke(); rect(b.x, b.y, b.w, b.h, 5);
    fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
    text(lbl, b.x + b.w / 2, b.y + b.h / 2); textStyle(NORMAL);
}

function drawSliderCtrl(label, val, cy, dispVal) {
    const s  = SLIDER_DEFS.find(d => d.cy === cy);
    const t  = (val - s.mn) / (s.mx - s.mn);
    const tx = SL_X + SL_W * t;
    noStroke(); fill(35, 45, 100); textSize(11); textAlign(RIGHT, CENTER);
    text(label + '  ' + dispVal, SL_X - 8, cy);
    fill(178, 183, 210); noStroke(); rect(SL_X, cy - 4, SL_W, 8, 4);
    fill(70, 110, 200); rect(SL_X, cy - 4, SL_W * t, 8, 4);
    fill(255); stroke(75, 110, 200); strokeWeight(2); circle(tx, cy, 18);
}

// ============================================================
// INPUT
// ============================================================
function mousePressed() {
    if (inBtn(PREV_B) && stage > 1)      { stage--; return; }
    if (inBtn(NEXT_B) && stage < NSTAGE) { stage++; return; }
    if (inBtn(ANIM_B)) { isAnimating = !isAnimating; return; }
    if (inBtn(RSET_B)) {
        Vs = 12; R1v = 1000; R2v = 2000; R3v = 3000;
        stage = 1; isAnimating = false; animTime = 0;
        recalculate(); return;
    }
    startDrag();
}
function mouseDragged() { if (dragSlider) applyDrag(); }
function mouseReleased() { dragSlider = null; }

function inBtn(b) {
    return mouseX >= b.x && mouseX <= b.x + b.w &&
           mouseY >= b.y && mouseY <= b.y + b.h;
}
function startDrag() {
    for (const s of SLIDER_DEFS) {
        if (mouseX >= SL_X - 12 && mouseX <= SL_X + SL_W + 12 &&
            mouseY >= s.cy - 14  && mouseY <= s.cy + 14) {
            dragSlider = s.key; applyDrag(); return;
        }
    }
}
function applyDrag() {
    const s = SLIDER_DEFS.find(d => d.key === dragSlider);
    if (!s) return;
    const t   = constrain((mouseX - SL_X) / SL_W, 0, 1);
    const raw = s.mn + t * (s.mx - s.mn);
    if (s.key === 'vs') {
        Vs = round(raw * 10) / 10;
    } else {
        const r = constrain(round(raw / 100) * 100, s.mn, s.mx);
        if (s.key === 'r1') R1v = r;
        if (s.key === 'r2') R2v = r;
        if (s.key === 'r3') R3v = r;
    }
    recalculate();
}
</script>
</body>
</html>
