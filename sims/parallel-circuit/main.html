<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
<title>Parallel Circuit Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
<script src="../circuit-lib/circuit-lib.js"></script>
<style>
  body { margin: 0; padding: 0; background: #e8eaf0; }
  canvas { display: block; }
</style>
</head>
<body>
<main></main>
<script>
// ============================================================
// Parallel Circuit Analysis MicroSim
// Chapter 2: Ohm's Law and Basic Circuit Configurations
// Bloom L2 (Understand) – explain voltage equality and current
//   division in parallel circuits
// 5-stage step-through; animated wire thickness ∝ branch current
// ============================================================

// ── Canvas & layout ────────────────────────────────────────
const CW       = 680;
const circuitH = 370;
const controlH = 130;
const CH       = circuitH + controlH;  // 500
const PANEL_X  = 420;

// lineWidth global used by circuit-lib drawing functions
lineWidth = 2;

// ── Circuit geometry ───────────────────────────────────────
const TOP_Y = 80;    // top bus y-coordinate
const BOT_Y = 300;   // bottom bus y-coordinate
const BAT_X = 80;    // battery / left-side x
const BAT_Y = 190;   // battery symbol centre y
const BAT_R = 28;    // battery symbol radius

// Branch x-positions (one per resistor)
const B1X = 188;
const B2X = 282;
const B3X = 376;

// Resistor bounding boxes (VERTICAL) – component centres on BAT_Y
const RH = 104, RW = 40;
const CY  = (TOP_Y + BOT_Y) / 2;   // vertical centre = 190
const R_TOP = CY - RH / 2;          // resistor top y  = 138
const R_BOT = CY + RH / 2;          // resistor bottom y = 242

const R1B = { x: B1X - RW / 2, y: R_TOP, w: RW, h: RH };
const R2B = { x: B2X - RW / 2, y: R_TOP, w: RW, h: RH };
const R3B = { x: B3X - RW / 2, y: R_TOP, w: RW, h: RH };

// ── Circuit values ─────────────────────────────────────────
let Vs  = 12;     // V, 1–20
let R1v = 1000;   // Ω, 500–5000
let R2v = 2000;
let R3v = 3000;

// Derived
let I1, I2, I3, I_total, Req;

function recalculate() {
    I1      = Vs / R1v;
    I2      = Vs / R2v;
    I3      = Vs / R3v;
    I_total = I1 + I2 + I3;
    Req     = Vs / I_total;   // = 1 / (1/R1 + 1/R2 + 1/R3)
}

// ── Stage ──────────────────────────────────────────────────
let stage    = 1;
const NSTAGE = 5;

// ── Animation ─────────────────────────────────────────────
let isAnimating = false;  // default: stopped

// ── Slider layout ──────────────────────────────────────────
const SL_LM = 260;
const SL_X  = SL_LM;
const SL_W  = CW - SL_LM - 18;
const SL_VS = circuitH + 40;
const SL_R1 = circuitH + 64;
const SL_R2 = circuitH + 88;
const SL_R3 = circuitH + 112;

// ── Buttons ────────────────────────────────────────────────
const BY     = circuitH + 8;
const PREV_B = { x: 10,  y: BY, w: 85,  h: 26 };
const NEXT_B = { x: 160, y: BY, w: 85,  h: 26 };
const ANIM_B = { x: 380, y: BY, w: 120, h: 26 };
const RSET_B = { x: 510, y: BY, w: 75,  h: 26 };

let dragSlider = null;

// ══════════════════════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════════════════════
function setup() {
    createCanvas(CW, CH).parent(select('main').elt);
    textFont('Arial');
    recalculate();
}

// ══════════════════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════════════════
function draw() {
    if (isAnimating) animationTime += deltaTime;
    background(232, 234, 240);
    drawSchematic();
    drawInfoPanel();
    drawControls();
}

// ──────────────────────────────────────────────────────────
// FORMAT HELPERS
// ──────────────────────────────────────────────────────────
function fmtV(v)   { return v.toFixed(2) + ' V'; }
function fmtI(v)   { return (v * 1000).toFixed(2) + ' mA'; }
function fmtR(v) {
    return v >= 1000 ? (v / 1000).toFixed(1) + ' kΩ' : v.toFixed(0) + ' Ω';
}

// ──────────────────────────────────────────────────────────
// WIRE HELPER – animated with current-proportional thickness
// current = amps flowing through this segment
// ──────────────────────────────────────────────────────────
function drawCurrentWire(x1, y1, x2, y2, current) {
    const frac = (I_total > 0) ? current / I_total : 0;
    const lw   = constrain(map(frac, 0, 1, 1.5, 5.5), 1.5, 5.5);

    if (isAnimating && current > 0) {
        lineWidth = lw;
        const spd = constrain(current * 22, 0.003, 0.65);
        drawAnimatedWire(x1, y1, x2, y2, spd, 0.78);
        lineWidth = 2;
    } else {
        stroke(0);
        strokeWeight(lw);
        line(x1, y1, x2, y2);
    }
}

// Static wire (battery leads, etc.)
function staticWire(x1, y1, x2, y2) {
    stroke(0); strokeWeight(2); line(x1, y1, x2, y2);
}

// ══════════════════════════════════════════════════════════
// SCHEMATIC
// ══════════════════════════════════════════════════════════
function drawSchematic() {
    // Background
    fill(252, 252, 255); noStroke();
    rect(0, 0, PANEL_X, circuitH, 8, 0, 0, 8);

    // Title
    fill(20, 30, 80); textSize(13); textStyle(BOLD);
    textAlign(CENTER, TOP);
    text('Parallel Circuit', PANEL_X / 2, 8);
    textStyle(NORMAL);

    // ── Top bus (3 segments, decreasing current L→R) ──────
    drawCurrentWire(BAT_X, TOP_Y, B1X, TOP_Y, I_total);    // full current
    drawCurrentWire(B1X,   TOP_Y, B2X, TOP_Y, I2 + I3);    // after R1 branch
    drawCurrentWire(B2X,   TOP_Y, B3X, TOP_Y, I3);          // after R2 branch

    // ── Three resistor branches (top→bottom, each Ii) ─────
    drawCurrentWire(B1X, TOP_Y, B1X, BOT_Y, I1);
    drawCurrentWire(B2X, TOP_Y, B2X, BOT_Y, I2);
    drawCurrentWire(B3X, TOP_Y, B3X, BOT_Y, I3);

    // ── Bottom bus (3 segments, increasing current R→L) ───
    drawCurrentWire(B3X, BOT_Y, B2X, BOT_Y, I3);            // just I3
    drawCurrentWire(B2X, BOT_Y, B1X, BOT_Y, I2 + I3);      // merging
    drawCurrentWire(B1X, BOT_Y, BAT_X, BOT_Y, I_total);    // full current

    // ── Battery lead wires (static – battery does the work) ─
    staticWire(BAT_X, TOP_Y, BAT_X, BAT_Y - BAT_R);        // top lead
    staticWire(BAT_X, BAT_Y + BAT_R, BAT_X, BOT_Y);        // bottom lead

    // ── Voltage source symbol ─────────────────────────────
    // White patch behind circle
    fill(252, 252, 255); noStroke();
    rect(BAT_X - BAT_R - 2, BAT_Y - BAT_R - 2,
         (BAT_R + 2) * 2, (BAT_R + 2) * 2);

    // Circle
    fill(252, 252, 255); stroke(0); strokeWeight(2);
    circle(BAT_X, BAT_Y, BAT_R * 2);

    // + and - marks
    strokeWeight(1.8); stroke(40, 120, 40);
    line(BAT_X - 7, BAT_Y - 10, BAT_X + 7, BAT_Y - 10);
    line(BAT_X,     BAT_Y - 16, BAT_X,     BAT_Y - 4);   // + (upper)
    line(BAT_X - 7, BAT_Y + 10, BAT_X + 7, BAT_Y + 10); // − (lower)

    // Vs label left of source
    noStroke(); fill(20, 60, 160);
    textSize(13); textStyle(BOLD); textAlign(RIGHT, CENTER);
    text('Vs', BAT_X - BAT_R - 6, BAT_Y - 8);
    textStyle(NORMAL); textSize(12);
    text(fmtV(Vs), BAT_X - BAT_R - 6, BAT_Y + 11);

    // Junction dots at branch/bus intersections
    fill(0); noStroke();
    circle(BAT_X, TOP_Y, 7);
    circle(BAT_X, BOT_Y, 7);
    circle(B1X, TOP_Y, 7); circle(B1X, BOT_Y, 7);
    circle(B2X, TOP_Y, 7); circle(B2X, BOT_Y, 7);
    circle(B3X, TOP_Y, 7); circle(B3X, BOT_Y, 7);

    // ── Resistors (drawn over branch wires) ───────────────
    stroke(0); noFill();
    drawResistor(R1B.x, R1B.y, R1B.w, R1B.h, lineWidth, VERTICAL,
        'R1=' + fmtR(R1v), LEFT);
    drawResistor(R2B.x, R2B.y, R2B.w, R2B.h, lineWidth, VERTICAL,
        'R2=' + fmtR(R2v), LEFT);
    drawResistor(R3B.x, R3B.y, R3B.w, R3B.h, lineWidth, VERTICAL,
        'R3=' + fmtR(R3v), LEFT);

    // ── Stage overlays ────────────────────────────────────
    if (stage >= 1) drawVoltageLabels();   // Vs = same across all
    if (stage >= 2) drawCurrentLabels();   // I1, I2, I3 on branches
    if (stage >= 3) drawTotalCurrentArrow();
}

function drawVoltageLabels() {
    // Small "= Vs" annotation near top of each branch (inside loop)
    // Reinforces: same voltage across every resistor
    noStroke(); fill(20, 60, 160); textSize(9); textAlign(CENTER, BOTTOM);
    text(fmtV(Vs), B1X, R_TOP - 4);
    text(fmtV(Vs), B2X, R_TOP - 4);
    text(fmtV(Vs), B3X, R_TOP - 4);
    // Brace labels
    textSize(9); fill(100, 110, 160);
    text('= Vs', B1X, R_TOP - 14);
    text('= Vs', B2X, R_TOP - 14);
    text('= Vs', B3X, R_TOP - 14);
}

function drawCurrentLabels() {
    // I1, I2, I3 right of each branch, at mid-height
    const my = CY + 10;
    noStroke(); textSize(11); textStyle(BOLD);

    fill(180, 50, 10);
    textAlign(LEFT, CENTER);
    text('I1=' + fmtI(I1), B1X + 4, my - 20);

    fill(10, 110, 30);
    text('I2=' + fmtI(I2), B2X + 4, my);

    fill(60, 10, 160);
    text('I3=' + fmtI(I3), B3X + 4, my + 20);
    textStyle(NORMAL);
}

function drawTotalCurrentArrow() {
    // Arrow on the left-side bus showing I_total going right
    const ax = BAT_X + 8, ay = TOP_Y - 10;
    fill(30, 30, 30); noStroke();
    triangle(ax, ay - 5, ax + 14, ay, ax, ay + 5);
    textSize(10); textAlign(LEFT, CENTER);
    fill(30, 30, 30);
    text('I_total', ax + 17, ay);
}

// ══════════════════════════════════════════════════════════
// INFO PANEL (cumulative stage reveals)
// ══════════════════════════════════════════════════════════
function drawInfoPanel() {
    const pw = CW - PANEL_X;
    const lx = PANEL_X + 9;
    const lw = pw - 14;

    // Background
    fill(233, 237, 252); noStroke();
    rect(PANEL_X, 0, pw, circuitH, 0, 8, 8, 0);

    // Title bar
    fill(50, 70, 160); noStroke();
    rect(PANEL_X, 0, pw, 24, 0, 8, 0, 0);
    fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
    text('ANALYSIS  –  Stage ' + stage + ' of ' + NSTAGE,
         PANEL_X + pw / 2, 12);
    textStyle(NORMAL);

    let y = 32;

    // ── Stage 1: Given Values ─────────────────────────────
    panelLabel('GIVEN VALUES', lx, y);      y += 13;
    panelRow('Vs = ' + fmtV(Vs),  lx, y, [20,  60, 160]); y += 13;
    panelRow('R1 = ' + fmtR(R1v), lx, y, [170, 40,  40]); y += 13;
    panelRow('R2 = ' + fmtR(R2v), lx, y, [30, 120,  40]); y += 13;
    panelRow('R3 = ' + fmtR(R3v), lx, y, [80,  20, 180]); y += 17;

    if (stage < 2) return;
    panelDivider(lx, y, lw); y += 8;

    // ── Stage 2: Branch Currents ──────────────────────────
    panelLabel('BRANCH CURRENTS', lx, y);   y += 13;
    panelRow('I1 = Vs/R1 = ' + fmtI(I1), lx, y, [170, 40,  40]); y += 13;
    panelRow('I2 = Vs/R2 = ' + fmtI(I2), lx, y, [30, 120,  40]); y += 13;
    panelRow('I3 = Vs/R3 = ' + fmtI(I3), lx, y, [80,  20, 180]); y += 17;

    if (stage < 3) return;
    panelDivider(lx, y, lw); y += 8;

    // ── Stage 3: Total Current ────────────────────────────
    panelLabel('TOTAL CURRENT', lx, y);     y += 13;
    panelRow('I_total = I1 + I2 + I3', lx, y, [50, 50, 50]); y += 13;
    panelRow('= ' + fmtI(I1) + ' + ' + fmtI(I2), lx+4, y, [50, 50, 50]); y += 13;
    panelRow('  + ' + fmtI(I3), lx+4, y, [50, 50, 50]); y += 13;
    // Highlighted result
    fill(190, 55, 10); noStroke(); rect(lx, y, lw, 17, 3);
    fill(255); textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
    text('I_total = ' + fmtI(I_total), lx + 4, y + 2);
    textStyle(NORMAL); y += 21;

    if (stage < 4) return;
    panelDivider(lx, y, lw); y += 8;

    // ── Stage 4: Equivalent Resistance ───────────────────
    panelLabel('EQUIVALENT RESISTANCE', lx, y); y += 13;
    panelRow('1/Req = 1/R1 + 1/R2 + 1/R3', lx, y, [50, 50, 50]); y += 13;
    // Numeric substitution
    const inv1 = (1/R1v * 1000).toFixed(3);
    const inv2 = (1/R2v * 1000).toFixed(3);
    const inv3 = (1/R3v * 1000).toFixed(3);
    panelRow('(in mS: ' + inv1 + '+' + inv2 + '+' + inv3 + ')', lx+4, y, [80, 80, 80]); y += 13;
    // Result
    noStroke(); fill(0, 120, 0);
    textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
    text('Req = ' + fmtR(Req), lx, y);
    textStyle(NORMAL); y += 17;

    if (stage < 5) return;
    panelDivider(lx, y, lw); y += 8;

    // ── Stage 5: Verify I_total = Vs / Req ───────────────
    panelLabel('VERIFICATION', lx, y);      y += 13;
    panelRow('I = Vs / Req', lx, y, [50, 50, 50]); y += 13;
    panelRow('= ' + fmtV(Vs) + ' / ' + fmtR(Req), lx+4, y, [50, 50, 50]); y += 13;
    const verifyI = Vs / Req;
    const ok = Math.abs(verifyI - I_total) < 0.0001;
    fill(ok ? color(0, 140, 0) : color(200, 0, 0));
    noStroke(); rect(lx, y, lw, 17, 3);
    fill(255); textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
    text((ok ? '= ' : '≈ ') + fmtI(verifyI) + ' = I_total  ' + (ok ? '✓' : '!'),
         lx + 4, y + 2);
    textStyle(NORMAL);

    // Key insight box
    y += 22;
    fill(230, 240, 255); stroke(100, 130, 200); strokeWeight(1);
    rect(lx, y, lw, 38, 3);
    noStroke(); fill(30, 50, 140);
    textSize(10); textAlign(CENTER, TOP);
    text('Voltage is equal across all branches.', lx + lw/2, y + 4);
    text('Current divides: more through less R.', lx + lw/2, y + 18);
    text('Req < smallest R = ' + fmtR(min(R1v, R2v, R3v)), lx + lw/2, y + 32);
}

function panelLabel(txt, x, y) {
    noStroke(); fill(0, 100, 0);
    textSize(10); textStyle(BOLD); textAlign(LEFT, TOP);
    text(txt, x, y); textStyle(NORMAL);
}

function panelRow(txt, x, y, col) {
    noStroke(); fill(col[0], col[1], col[2]);
    textSize(11); textAlign(LEFT, TOP);
    text(txt, x, y);
}

function panelDivider(x, y, w) {
    stroke(175, 180, 215); strokeWeight(1); line(x, y, x + w, y);
}

// ══════════════════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════════════════
function drawControls() {
    fill(218, 224, 240); noStroke();
    rect(0, circuitH, CW, controlH, 0, 0, 8, 8);

    // Buttons
    drawBtn(PREV_B, '◀ Prev Stage',
        stage > 1 ? [70, 90, 175] : [150, 155, 180]);

    noStroke(); fill(25, 35, 100);
    textSize(12); textStyle(BOLD); textAlign(CENTER, CENTER);
    text('Stage ' + stage + '/' + NSTAGE,
         (PREV_B.x + PREV_B.w + NEXT_B.x) / 2, BY + PREV_B.h / 2);
    textStyle(NORMAL);

    drawBtn(NEXT_B, 'Next Stage ▶',
        stage < NSTAGE ? [70, 90, 175] : [150, 155, 180]);
    drawBtn(ANIM_B,
        isAnimating ? '■ Stop Animation' : '▶ Animate Current',
        isAnimating ? [150, 50, 50] : [50, 125, 55]);
    drawBtn(RSET_B, '↺ Reset', [100, 105, 135]);

    // Sliders
    drawSlider('Source Voltage (Vs):', Vs,  1,    20,   SL_VS, fmtV(Vs));
    drawSlider('R1 (Ω):',             R1v, 500,  5000, SL_R1, fmtR(R1v));
    drawSlider('R2 (Ω):',             R2v, 500,  5000, SL_R2, fmtR(R2v));
    drawSlider('R3 (Ω):',             R3v, 500,  5000, SL_R3, fmtR(R3v));
}

function drawBtn(b, lbl, col) {
    fill(col[0], col[1], col[2]); noStroke();
    rect(b.x, b.y, b.w, b.h, 5);
    fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
    text(lbl, b.x + b.w / 2, b.y + b.h / 2);
    textStyle(NORMAL);
}

function drawSlider(label, val, mn, mx, cy, dispVal) {
    const t  = (val - mn) / (mx - mn);
    const tx = SL_X + SL_W * t;

    noStroke(); fill(35, 45, 100);
    textSize(11); textAlign(RIGHT, CENTER);
    text(label + '  ' + dispVal, SL_X - 8, cy);

    fill(178, 183, 210); noStroke(); rect(SL_X, cy - 4, SL_W, 8, 4);
    fill(70, 110, 200); rect(SL_X, cy - 4, SL_W * t, 8, 4);
    fill(255); stroke(75, 110, 200); strokeWeight(2);
    circle(tx, cy, 18);
}

// ══════════════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════════════
function mousePressed() {
    if (inBtn(PREV_B) && stage > 1)      { stage--; return; }
    if (inBtn(NEXT_B) && stage < NSTAGE) { stage++; return; }
    if (inBtn(ANIM_B)) { isAnimating = !isAnimating; return; }
    if (inBtn(RSET_B)) {
        Vs = 12; R1v = 1000; R2v = 2000; R3v = 3000;
        stage = 1; isAnimating = false; animationTime = 0;
        recalculate(); return;
    }
    startSliderDrag();
}

function mouseDragged() { if (dragSlider) applySliderDrag(); }
function mouseReleased() { dragSlider = null; }

function inBtn(b) {
    return mouseX >= b.x && mouseX <= b.x + b.w &&
           mouseY >= b.y && mouseY <= b.y + b.h;
}

const SLIDER_DEFS = [
    { key: 'vs', cy: SL_VS, mn: 1,    mx: 20   },
    { key: 'r1', cy: SL_R1, mn: 500,  mx: 5000 },
    { key: 'r2', cy: SL_R2, mn: 500,  mx: 5000 },
    { key: 'r3', cy: SL_R3, mn: 500,  mx: 5000 },
];

function startSliderDrag() {
    for (const s of SLIDER_DEFS) {
        if (mouseX >= SL_X - 12 && mouseX <= SL_X + SL_W + 12 &&
            mouseY >= s.cy - 14  && mouseY <= s.cy + 14) {
            dragSlider = s.key;
            applySliderDrag();
            return;
        }
    }
}

function applySliderDrag() {
    const s   = SLIDER_DEFS.find(d => d.key === dragSlider);
    if (!s) return;
    const t   = constrain((mouseX - SL_X) / SL_W, 0, 1);
    const raw = s.mn + t * (s.mx - s.mn);
    if (s.key === 'vs') {
        Vs  = round(raw * 10) / 10;             // 0.1 V steps
    } else {
        const r = round(raw / 100) * 100;        // 100 Ω steps
        if (s.key === 'r1') R1v = constrain(r, s.mn, s.mx);
        if (s.key === 'r2') R2v = constrain(r, s.mn, s.mx);
        if (s.key === 'r3') R3v = constrain(r, s.mn, s.mx);
    }
    recalculate();
}
</script>
<script src="../../js/microsim-controls.js"></script>
</body>
