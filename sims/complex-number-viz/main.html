<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complex Number Visualizer</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
<style>
  body { margin: 0; padding: 0; background: #e8eaf0; }
  canvas { display: block; }
</style>
</head>
<body>
<main></main>
<script>
// Complex Number Visualizer
// Chapter 8: AC Signals and Sinusoidal Waveforms
// Shows rectangular ↔ polar form on complex plane

const CW = 680;
const PLANE_SIZE = 340;
const INFO_W = CW - PLANE_SIZE;
const CH = PLANE_SIZE + 120;

const CX = PLANE_SIZE / 2;  // complex plane center x
const CY = PLANE_SIZE / 2;  // complex plane center y
const SCALE = 32;            // pixels per unit

// Mode: 'rect' or 'polar'
let mode = 'rect';
let a = 3, b = 4;  // rectangular: a + jb
// polar derived from a,b

// Sliders
const SL_X = PLANE_SIZE + 10;
const SL_W = INFO_W - 20;
const SL_Y1 = PLANE_SIZE + 30;
const SL_Y2 = PLANE_SIZE + 58;

const BTN_RECT  = { x: 10,  y: PLANE_SIZE + 86, w: 100, h: 26 };
const BTN_POLAR = { x: 120, y: PLANE_SIZE + 86, w: 100, h: 26 };
const BTN_RAND  = { x: 230, y: PLANE_SIZE + 86, w: 100, h: 26 };
const BTN_RST   = { x: 340, y: PLANE_SIZE + 86, w: 70,  h: 26 };

let dragSlider = null;
let draggingPoint = false;

function r()     { return sqrt(a * a + b * b); }
function theta() { return atan2(b, a); }

function setup() {
  createCanvas(CW, CH).parent(select('main').elt);
  textFont('Arial');
}

function draw() {
  background(232, 234, 240);
  drawPlane();
  drawInfoPanel();
  drawControls();
}

function drawPlane() {
  fill(252, 252, 255); noStroke(); rect(0, 0, PLANE_SIZE, PLANE_SIZE);

  fill(20, 30, 80); textSize(12); textStyle(BOLD); textAlign(CENTER, TOP);
  text('Complex Plane', PLANE_SIZE / 2, 5);
  textStyle(NORMAL);

  const ox = CX, oy = CY;

  // Grid
  stroke(215, 220, 235); strokeWeight(1);
  for (let v = -5; v <= 5; v++) {
    if (v === 0) continue;
    line(ox + v * SCALE, 20, ox + v * SCALE, PLANE_SIZE - 10);
    line(20, oy - v * SCALE, PLANE_SIZE - 10, oy - v * SCALE);
  }

  // Axes
  stroke(100, 110, 160); strokeWeight(2);
  line(20, oy, PLANE_SIZE - 10, oy);
  line(ox, 20, ox, PLANE_SIZE - 10);

  // Axis labels
  fill(80, 90, 140); noStroke(); textSize(10); textAlign(CENTER, TOP);
  text('Re', PLANE_SIZE - 14, oy + 4);
  textAlign(LEFT, CENTER);
  text('Im (j)', ox + 4, 22);
  // Tick labels
  textAlign(CENTER, TOP); textSize(9);
  for (let v = -4; v <= 4; v++) {
    if (v === 0) continue;
    text(v, ox + v * SCALE, oy + 3);
  }
  textAlign(RIGHT, CENTER); textSize(9);
  for (let v = -4; v <= 4; v++) {
    if (v === 0) continue;
    text(v + 'j', ox - 3, oy - v * SCALE);
  }

  // Real projection (dashed blue line)
  stroke(50, 100, 210); strokeWeight(1.5); setLineDash([4, 4]);
  const px = ox + a * SCALE;
  const py = oy - b * SCALE;
  line(px, oy, px, py);  // vertical to point
  line(ox, py, px, py);  // horizontal to point
  setLineDash([]);

  // Magnitude vector (red)
  stroke(200, 50, 50); strokeWeight(2.5);
  line(ox, oy, px, py);
  // Arrow head
  const ang = atan2(py - oy, px - ox);
  fill(200, 50, 50); noStroke();
  push(); translate(px, py); rotate(ang);
  triangle(-8, -4, -8, 4, 0, 0); pop();

  // Angle arc
  noFill(); stroke(160, 50, 180); strokeWeight(1.5);
  const arcR = 28;
  arc(ox, oy, arcR * 2, arcR * 2, -theta(), 0);
  // Angle label
  const midAng = -theta() / 2;
  noStroke(); fill(160, 50, 180); textSize(10); textAlign(LEFT, CENTER);
  text('θ = ' + degrees(theta()).toFixed(1) + '°',
       ox + (arcR + 6) * cos(midAng), oy + (arcR + 6) * sin(midAng));

  // Point
  fill(200, 50, 50); noStroke(); circle(px, py, 12);

  // Labels on projections
  noStroke(); fill(50, 100, 210); textSize(10); textStyle(BOLD);
  textAlign(CENTER, BOTTOM); text('a = ' + a.toFixed(2), (ox + px) / 2, oy - 2);
  textAlign(LEFT, CENTER);
  fill(30, 150, 80);
  text('b = ' + b.toFixed(2) + 'j', px + 4, (oy + py) / 2);
  textStyle(NORMAL);

  // Point label
  noStroke(); fill(160, 30, 30); textSize(11); textStyle(BOLD);
  textAlign(LEFT, BOTTOM);
  text('z', px + 6, py - 2);
  textStyle(NORMAL);
}

function drawInfoPanel() {
  const ix = PLANE_SIZE;
  fill(238, 242, 255); noStroke(); rect(ix, 0, INFO_W, PLANE_SIZE);

  fill(30, 40, 100); textSize(12); textStyle(BOLD); textAlign(CENTER, TOP);
  text('Conversions', ix + INFO_W / 2, 8);
  textStyle(NORMAL);

  const mag = r();
  const ang = theta();
  const angDeg = degrees(ang);

  let y = 35;
  const lx = ix + 10;

  // Rectangular form box
  fill(230, 240, 255); noStroke(); rect(lx, y, INFO_W - 20, 52, 5);
  fill(30, 60, 160); textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
  text('Rectangular: a + jb', lx + 5, y + 4);
  textStyle(NORMAL); fill(50, 80, 200);
  text(`z = ${a.toFixed(3)} + j·${b.toFixed(3)}`, lx + 8, y + 18);
  fill(80, 100, 170); textSize(10);
  text(`Re(z) = ${a.toFixed(3)}`, lx + 8, y + 32);
  text(`Im(z) = ${b.toFixed(3)}`, lx + 8, y + 44);
  y += 60;

  // Polar form box
  fill(230, 255, 240); noStroke(); rect(lx, y, INFO_W - 20, 52, 5);
  fill(0, 120, 40); textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
  text('Polar: r∠θ', lx + 5, y + 4);
  textStyle(NORMAL); fill(0, 140, 50);
  text(`z = ${mag.toFixed(3)} ∠ ${angDeg.toFixed(1)}°`, lx + 8, y + 18);
  fill(0, 100, 40); textSize(10);
  text(`|z| = √(${a.toFixed(2)}² + ${b.toFixed(2)}²) = ${mag.toFixed(3)}`, lx + 8, y + 32);
  text(`θ = arctan(${b.toFixed(2)}/${a.toFixed(2)}) = ${angDeg.toFixed(1)}°`, lx + 8, y + 44);
  y += 60;

  // Exponential form
  fill(255, 245, 225); noStroke(); rect(lx, y, INFO_W - 20, 38, 5);
  fill(140, 80, 0); textSize(11); textStyle(BOLD); textAlign(LEFT, TOP);
  text('Exponential: r·eʲᶿ', lx + 5, y + 4);
  textStyle(NORMAL); fill(160, 90, 0);
  text(`z = ${mag.toFixed(3)}·ej·${angDeg.toFixed(1)}°`, lx + 8, y + 18);
  y += 46;

  // Formulas reminder
  fill(210, 215, 240); noStroke(); rect(lx, y, INFO_W - 20, 68, 5);
  fill(50, 60, 130); textSize(10); textAlign(LEFT, TOP);
  text('Rect → Polar:', lx + 5, y + 4);
  text(`  r = √(a²+b²)`, lx + 5, y + 16);
  text(`  θ = arctan(b/a)`, lx + 5, y + 28);
  text('Polar → Rect:', lx + 5, y + 40);
  text(`  a = r·cos(θ),  b = r·sin(θ)`, lx + 5, y + 52);
  y += 74;

  // Tip: drag point
  fill(180, 185, 210); noStroke(); textSize(9); textStyle(ITALIC); textAlign(CENTER, TOP);
  text('Drag the red point or use sliders', ix + INFO_W / 2, y);
  textStyle(NORMAL);
}

function drawControls() {
  fill(218, 224, 240); noStroke(); rect(0, PLANE_SIZE, CW, 120, 0, 0, 8, 8);

  const slLabel1 = mode === 'rect' ? 'Real part a:' : 'Magnitude r:';
  const slLabel2 = mode === 'rect' ? 'Imaginary b:' : 'Angle θ:';
  const slVal1   = mode === 'rect' ? a.toFixed(2) : r().toFixed(2);
  const slVal2   = mode === 'rect' ? b.toFixed(2) : degrees(theta()).toFixed(1) + '°';

  drawSlider(slLabel1, mode === 'rect' ? a : r(),
             mode === 'rect' ? -5 : 0, mode === 'rect' ? 5 : 7,
             SL_Y1, slVal1);
  drawSlider(slLabel2, mode === 'rect' ? b : degrees(theta()),
             -5, 5, SL_Y2, slVal2);

  drawBtn(BTN_RECT,  '▶ Rectangular', mode === 'rect'  ? [50, 110, 200] : [100, 120, 180]);
  drawBtn(BTN_POLAR, '▶ Polar',       mode === 'polar' ? [50, 110, 200] : [100, 120, 180]);
  drawBtn(BTN_RAND,  '⟳ Random',      [80, 130, 80]);
  drawBtn(BTN_RST,   '↺ Reset',       [100, 105, 135]);
}

function setLineDash(list) { drawingContext.setLineDash(list); }

function drawSlider(label, val, mn, mx, cy, dispVal) {
  const t  = constrain((val - mn) / (mx - mn), 0, 1);
  const tx = SL_X + SL_W * t;
  noStroke(); fill(35, 45, 100); textSize(11); textAlign(RIGHT, CENTER);
  text(label + '  ' + dispVal, SL_X - 8, cy);
  fill(178, 183, 210); noStroke(); rect(SL_X, cy - 4, SL_W, 8, 4);
  fill(70, 110, 200); rect(SL_X, cy - 4, SL_W * t, 8, 4);
  fill(255); stroke(75, 110, 200); strokeWeight(2); circle(tx, cy, 18);
}

function drawBtn(b, lbl, col) {
  fill(col[0], col[1], col[2]); noStroke(); rect(b.x, b.y, b.w, b.h, 5);
  fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
  text(lbl, b.x + b.w / 2, b.y + b.h / 2); textStyle(NORMAL);
}

function mousePressed() {
  // Check if clicking near the point on the complex plane
  const px = CX + a * SCALE;
  const py = CY - b * SCALE;
  if (dist(mouseX, mouseY, px, py) < 14) { draggingPoint = true; return; }

  if (inBtn(BTN_RECT))  { mode = 'rect'; return; }
  if (inBtn(BTN_POLAR)) { mode = 'polar'; return; }
  if (inBtn(BTN_RAND))  {
    a = round((random(-4, 4)) * 10) / 10;
    b = round((random(-4, 4)) * 10) / 10;
    return;
  }
  if (inBtn(BTN_RST)) { a = 3; b = 4; mode = 'rect'; return; }
  startSliderDrag();
}

function mouseDragged() {
  if (draggingPoint) {
    a = constrain(round((mouseX - CX) / SCALE * 10) / 10, -5, 5);
    b = constrain(round((CY - mouseY) / SCALE * 10) / 10, -5, 5);
    return;
  }
  if (dragSlider) applySliderDrag();
}

function mouseReleased() { dragSlider = null; draggingPoint = false; }

function inBtn(b) {
  return mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
}

const SL_DEFS_RECT  = [{ key: 'a', cy: SL_Y1, mn: -5, mx: 5 }, { key: 'b', cy: SL_Y2, mn: -5, mx: 5 }];
const SL_DEFS_POLAR = [{ key: 'r', cy: SL_Y1, mn: 0, mx: 7  }, { key: 'th',cy: SL_Y2, mn: -5, mx: 5 }];

function startSliderDrag() {
  const defs = mode === 'rect' ? SL_DEFS_RECT : SL_DEFS_POLAR;
  for (const s of defs) {
    if (mouseX >= SL_X - 12 && mouseX <= SL_X + SL_W + 12 &&
        mouseY >= s.cy - 14  && mouseY <= s.cy + 14) {
      dragSlider = s.key; applySliderDrag(); return;
    }
  }
}
function applySliderDrag() {
  const defs = mode === 'rect' ? SL_DEFS_RECT : SL_DEFS_POLAR;
  const s = defs.find(d => d.key === dragSlider);
  if (!s) return;
  const t = constrain((mouseX - SL_X) / SL_W, 0, 1);
  const raw = s.mn + t * (s.mx - s.mn);
  if (mode === 'rect') {
    if (s.key === 'a') a = constrain(round(raw * 10) / 10, s.mn, s.mx);
    if (s.key === 'b') b = constrain(round(raw * 10) / 10, s.mn, s.mx);
  } else {
    // polar sliders: r and theta (mapped -5 to 5 as -180° to 180°)
    if (s.key === 'r') {
      const rNew = constrain(round(raw * 10) / 10, 0, 7);
      const th   = theta();
      a = rNew * cos(th);
      b = rNew * sin(th);
    }
    if (s.key === 'th') {
      const thNew = raw * PI / 5;  // -5..5 → -π..π
      const rr = r();
      a = rr * cos(thNew);
      b = rr * sin(thNew);
    }
  }
}
</script>
</body>
</html>
