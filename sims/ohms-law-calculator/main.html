<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
  <title>Ohm's Law Interactive Calculator — Circuits 1</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body { font-family: Arial, Helvetica, sans-serif; background: #e8eaf0; }
    main { display: block; }
    canvas { display: block; }
  </style>
</head>
<body>
<main></main>
<script>
// ═══════════════════════════════════════════════════════════════════
// Ohm's Law Interactive Calculator — Circuits 1 MicroSim
// Chapter 2: Ohm's Law and Basic Circuit Configurations
// Bloom L2 (Understand) — manipulate V, I, R; observe dependencies
//
// Three panels (V, I, R).  Exactly one is "RESULT" (calculated);
// the other two are "CONTROL" (slider-driven).
// Click the ● RESULT / ● CONTROL badge on any panel to swap roles.
//
// Circuits 1 design-system palette
//   C_DRAW   #eef1fb  drawing-area background (light indigo tint)
//   C_CTRL   #dde1f0  control-area background
//   C_DEEP   [26,35,126]   dark-indigo  (titles)
//   C_PRIMARY [57,73,171]  indigo       (buttons, sliders)
//   C_ACCENT  [92,107,192] medium indigo
//   C_GOLD    [249,168,37] amber gold   (voltage)
//   C_GREEN   [46,125,50]  green        (resistance)
//   C_RED     [198,40,40]  red          (calculated / warning)
// ═══════════════════════════════════════════════════════════════════
new p5(function (p) {

  // ── Circuits 1 palette ───────────────────────────────────────────
  const C_DRAW    = '#eef1fb';
  const C_CTRL    = '#dde1f0';
  const C_DEEP    = [26,  35, 126];
  const C_PRIMARY = [57,  73, 171];
  const C_ACCENT  = [92, 107, 192];
  const C_GOLD    = [249, 168,  37];
  const C_GREEN   = [46,  125,  50];
  const C_RED     = [198,  40,  40];

  // Per-quantity colour identity
  const QC = {
    V: { h: C_GOLD,    t: [255,255,255] },
    I: { h: C_PRIMARY, t: [255,255,255] },
    R: { h: C_GREEN,   t: [255,255,255] },
  };

  // ── Layout ───────────────────────────────────────────────────────
  const DRAW_H  = 360;
  const CTRL_H  = 80;
  const PW      = 230;   // panel width
  const PH      = 190;   // panel height
  const PGAP    = 14;
  const PY      = 78;
  let CW, CH, FIRST_X;

  // ── State ────────────────────────────────────────────────────────
  let locked = [true, false, true];   // V=ctrl, I=calc, R=ctrl
  let vals   = { V: 5, I: 0.005, R: 1000 };   // SI: V, A, Ω

  const SL = {
    V: { val: 5,    min: 0.1,  max: 50,     gx:0, gy:0, gw:0 },
    I: { val: 5,    min: 0.1,  max: 1000,   gx:0, gy:0, gw:0 },   // mA
    R: { val: 1000, min: 1,    max: 100000, gx:0, gy:0, gw:0 },
  };
  let dragging  = null;
  let badgeBtns = [];

  // ── Setup ────────────────────────────────────────────────────────
  p.setup = function () {
    const cont = document.querySelector('main');
    CW     = Math.max(700, Math.floor(cont.getBoundingClientRect().width || 720));
    CH     = DRAW_H + CTRL_H;
    FIRST_X = (CW - 3 * PW - 2 * PGAP) / 2;
    p.createCanvas(CW, CH).parent(cont);
    recalc();
  };

  // ── Draw ─────────────────────────────────────────────────────────
  p.draw = function () {
    p.background(C_DRAW);
    p.noStroke(); p.fill(C_CTRL);
    p.rect(0, DRAW_H, CW, CTRL_H);

    header();
    formulaBanner();
    panels();
    triangle();
    hint();
    powerBar();
  };

  function header() {
    p.noStroke();
    p.fill(...C_DEEP);
    p.textAlign(p.CENTER, p.TOP);
    p.textSize(20); p.textStyle(p.BOLD);
    p.text("Ohm's Law Interactive Calculator", CW / 2, 10);
    p.textStyle(p.NORMAL);
    p.fill(...C_ACCENT); p.textSize(12);
    p.text('Adjust any two quantities — the third updates automatically.', CW / 2, 36);
  }

  function formulaBanner() {
    const bx = CW/2 - 155, by = 55, bw = 310, bh = 22;
    p.fill(...C_PRIMARY); p.noStroke(); p.rect(bx, by, bw, bh, 5);
    p.fill(255); p.textSize(14); p.textAlign(p.CENTER, p.CENTER);
    p.textStyle(p.BOLD);
    p.text('V  =  I  ×  R       P  =  V  ×  I', CW/2, by + bh/2);
    p.textStyle(p.NORMAL);
  }

  function panels() {
    badgeBtns = [];
    const keys   = ['V','I','R'];
    const labels = ['Voltage','Current','Resistance'];
    const units  = ['V','mA','Ω'];

    for (let i = 0; i < 3; i++) {
      const k    = keys[i];
      const px   = FIRST_X + i * (PW + PGAP);
      const py   = PY;
      const calc = !locked[i];
      const qc   = QC[k];

      // Drop shadow
      p.noStroke(); p.fill(0, 0, 0, 20);
      p.rect(px+3, py+3, PW, PH, 10);

      // Panel body
      p.fill(calc ? [255,255,255] : [238,241,255]);
      p.stroke(...qc.h, calc ? 210 : 90);
      p.strokeWeight(calc ? 3 : 1.5);
      p.rect(px, py, PW, PH, 10);

      // Header bar
      p.fill(...qc.h); p.noStroke();
      p.rect(px, py, PW, 34, 10, 10, 0, 0);
      p.fill(...qc.t); p.textSize(13); p.textStyle(p.BOLD);
      p.textAlign(p.CENTER, p.CENTER);
      p.text(labels[i] + '  (' + k + ')', px + PW/2, py + 17);
      p.textStyle(p.NORMAL);

      // RESULT / CONTROL badge
      const bw = 80, bh = 20;
      const bx = px + PW - bw - 8, by2 = py + 38;
      p.fill(...(calc ? C_RED : C_GREEN)); p.noStroke(); p.rect(bx, by2, bw, bh, 4);
      p.fill(255); p.textSize(10); p.textStyle(p.BOLD); p.textAlign(p.CENTER, p.CENTER);
      p.text(calc ? '● RESULT' : '● CONTROL', bx + bw/2, by2 + bh/2);
      p.textStyle(p.NORMAL);
      badgeBtns.push({ i, x: bx, y: by2, w: bw, h: bh });

      // Big value
      p.fill(...(calc ? C_RED : C_DEEP));
      p.textSize(34); p.textStyle(p.BOLD); p.textAlign(p.CENTER, p.CENTER);
      p.text(fmtVal(k) + ' ' + units[i], px + PW/2, py + 100);
      p.textStyle(p.NORMAL);

      // Slider or hint
      if (!calc) {
        slider(k, px + 14, py + PH - 44, PW - 28, qc.h);
      } else {
        p.fill(...C_ACCENT); p.textSize(10); p.textAlign(p.CENTER, p.CENTER);
        p.text('click ● RESULT to control this', px + PW/2, py + PH - 22);
      }
    }
  }

  function slider(key, sx, sy, sw, trackColor) {
    const sl = SL[key];
    const t  = (sl.val - sl.min) / (sl.max - sl.min);
    const tx = sx + t * sw;
    p.stroke(200); p.strokeWeight(5); p.line(sx, sy, sx+sw, sy);
    p.stroke(...trackColor); p.strokeWeight(5); p.line(sx, sy, tx, sy);
    p.noStroke(); p.fill(...trackColor); p.circle(tx, sy, 18);
    sl.gx = sx; sl.gy = sy; sl.gw = sw;
  }

  function triangle() {
    const tx = 28, ty = PY + 8, tw = 114, th = 82;
    p.stroke(...C_ACCENT); p.strokeWeight(2);
    p.fill([244, 246, 255]);
    p.triangle(tx+tw/2, ty, tx, ty+th, tx+tw, ty+th);
    p.stroke(...C_PRIMARY); p.strokeWeight(1.5);
    p.line(tx+tw/2, ty+th, tx+tw/2, ty+30);
    p.line(tx, ty+th, tx+tw, ty+th);
    [
      { t:'V', x:tx+tw/2,     y:ty+22,    c:C_GOLD    },
      { t:'I', x:tx+tw/4,     y:ty+th-14, c:C_PRIMARY },
      { t:'R', x:tx+3*tw/4,   y:ty+th-14, c:C_GREEN   },
    ].forEach(({t,x,y,c}) => {
      p.fill(...c); p.noStroke(); p.textSize(18);
      p.textStyle(p.BOLD); p.textAlign(p.CENTER, p.CENTER);
      p.text(t, x, y);
    });
    p.textStyle(p.NORMAL);
    p.fill(...C_ACCENT); p.textSize(10); p.textAlign(p.CENTER, p.TOP);
    p.text('Ohm\'s Law Triangle', tx+tw/2, ty+th+6);
  }

  function hint() {
    const hx = CW - 265, hy = PY + 8;
    p.fill(...C_ACCENT); p.noStroke(); p.textSize(11);
    p.textAlign(p.LEFT, p.TOP); p.textStyle(p.ITALIC);
    p.text(
      '💡 Try: increase R — watch I drop.\n' +
      '    Try: double V — what happens to I?\n' +
      '    Cover one cell in the triangle:\n' +
      '    the formula appears automatically.',
      hx, hy
    );
    p.textStyle(p.NORMAL);
  }

  function powerBar() {
    const pw = vals.V * vals.I;
    const by = DRAW_H + 16, bw = 480;
    p.fill(...C_DEEP); p.noStroke(); p.rect(CW/2 - bw/2, by, bw, 34, 8);
    p.fill(255); p.textSize(14); p.textAlign(p.CENTER, p.CENTER); p.textStyle(p.BOLD);
    p.text(
      'P = V × I  =  ' + fmtVal('V') + ' V  ×  ' + fmtVal('I') + ' mA  =  ' + fmtPow(pw),
      CW/2, by + 17
    );
    p.textStyle(p.NORMAL);
  }

  // ── Formatters ───────────────────────────────────────────────────
  function fmtVal(k) {
    if (k === 'V') return vals.V.toFixed(vals.V < 10 ? 2 : 1);
    if (k === 'I') { const mA = vals.I*1000; return mA.toFixed(mA < 10 ? 2 : 1); }
    if (k === 'R') {
      if (vals.R >= 1000) return (vals.R/1000).toFixed(vals.R < 10000 ? 2 : 1) + 'k';
      return vals.R.toFixed(0);
    }
  }
  function fmtPow(pw) {
    if (pw < 0.001) return (pw*1e6).toFixed(1)+' μW';
    if (pw < 1)     return (pw*1000).toFixed(2)+' mW';
    if (pw < 1000)  return pw.toFixed(3)+' W';
    return (pw/1000).toFixed(2)+' kW';
  }

  // ── Recalculate ──────────────────────────────────────────────────
  function recalc() {
    const ci = locked.indexOf(false);
    if (ci < 0) return;
    if (ci===0) { vals.V = vals.I*vals.R;  SL.V.val = vals.V; }
    if (ci===1) { vals.I = vals.V/vals.R;  SL.I.val = vals.I*1000; }
    if (ci===2) { vals.R = vals.V/vals.I;  SL.R.val = vals.R; }
    ['V','I','R'].forEach(k => { SL[k].val = p.constrain(SL[k].val, SL[k].min, SL[k].max); });
  }

  // ── Mouse ────────────────────────────────────────────────────────
  p.mousePressed = function () {
    for (const b of badgeBtns) {
      if (p.mouseX>=b.x && p.mouseX<=b.x+b.w && p.mouseY>=b.y && p.mouseY<=b.y+b.h) {
        if (locked[b.i]) {             // currently a control — make it the result
          const prev = locked.indexOf(false);
          if (prev >= 0) locked[prev] = true;
          locked[b.i] = false;
          recalc();
        }
        return;
      }
    }
    ['V','I','R'].forEach((k, i) => {
      if (!locked[i]) return;
      const sl = SL[k];
      if (!sl.gx) return;
      if (Math.abs(p.mouseY - sl.gy) < 14 &&
          p.mouseX >= sl.gx-10 && p.mouseX <= sl.gx+sl.gw+10) {
        dragging = k; updateSl(k);
      }
    });
  };
  p.mouseDragged = function () { if (dragging) updateSl(dragging); };
  p.mouseReleased = function () { dragging = null; };

  function updateSl(k) {
    const sl = SL[k];
    const t  = p.constrain((p.mouseX - sl.gx) / sl.gw, 0, 1);
    sl.val   = sl.min + t*(sl.max - sl.min);
    if (k==='V') vals.V = sl.val;
    if (k==='I') vals.I = sl.val / 1000;
    if (k==='R') vals.R = sl.val;
    recalc();
  }
});
</script>
<script src="../../js/microsim-controls.js"></script>
</body>
</html>
