<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Domain vs Frequency Domain</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
<style>
  body { margin: 0; padding: 0; background: #e8eaf0; }
  canvas { display: block; }
</style>
</head>
<body>
<main></main>
<script>
// Time Domain vs Frequency Domain MicroSim
// Chapter 8: AC Signals and Sinusoidal Waveforms

const CW = 680;
const PANEL_H = 320;
const CTRL_H  = 140;
const CH = PANEL_H + CTRL_H;

const HALF = CW / 2;
const PL = 50, PR = 15, PT = 30, PB = 30;
const PW = HALF - PL - PR;
const PH = PANEL_H - PT - PB;

// Stage: 1 = single sine, 2 = two sines, 3 = three (complex), 4 = square wave
let stage = 1;
let f1 = 5;
let numHarmonics = 7;

// Buttons
const BY = PANEL_H + 10;
const PREV_B = { x: 10,  y: BY, w: 80, h: 26 };
const NEXT_B = { x: 100, y: BY, w: 80, h: 26 };
const RST_B  = { x: 190, y: BY, w: 70, h: 26 };

const SL_X = 300;
const SL_W = CW - SL_X - 20;
const SL_Y1 = PANEL_H + 30;
const SL_Y2 = PANEL_H + 58;
const SL_Y3 = PANEL_H + 86;

const STAGE_NAMES = ['', 'Single Sinusoid', 'Two Sinusoids', 'Three Sinusoids', 'Square Wave'];
const NSTAGE = 4;

function setup() {
  createCanvas(CW, CH).parent(select('main').elt);
  textFont('Arial');
}

function draw() {
  background(232, 234, 240);
  drawTimeDomain();
  drawFreqDomain();
  drawControls();
}

// Build the composite signal for current stage
function signal(t) {
  const w1 = TWO_PI * f1;
  if (stage === 1) return sin(w1 * t);
  if (stage === 2) return 0.8 * sin(w1 * t) + 0.5 * sin(3 * w1 * t);
  if (stage === 3) return 0.8 * sin(w1 * t) + 0.5 * sin(3 * w1 * t) + 0.3 * sin(5 * w1 * t);
  // Square wave: sum of odd harmonics
  let s = 0;
  for (let k = 1; k <= numHarmonics * 2 - 1; k += 2) s += (1 / k) * sin(k * w1 * t);
  return s * (4 / PI);
}

// Returns array of {freq, amplitude} spectral lines
function spectrum() {
  const w1 = TWO_PI * f1;
  if (stage === 1) return [{ f: f1, a: 1.0, col: [50, 100, 210] }];
  if (stage === 2) return [
    { f: f1,      a: 0.8, col: [50, 100, 210] },
    { f: 3 * f1,  a: 0.5, col: [210, 100, 50] },
  ];
  if (stage === 3) return [
    { f: f1,      a: 0.8, col: [50, 100, 210] },
    { f: 3 * f1,  a: 0.5, col: [210, 100, 50] },
    { f: 5 * f1,  a: 0.3, col: [50, 160, 80]  },
  ];
  // Square wave harmonics
  const lines = [];
  const cols = [[50,100,210],[210,100,50],[50,160,80],[160,50,180],[180,150,20]];
  for (let k = 0; k < numHarmonics; k++) {
    const harmN = 2 * k + 1;
    lines.push({ f: harmN * f1, a: (4 / PI) / harmN, col: cols[k % cols.length] });
  }
  return lines;
}

function drawTimeDomain() {
  fill(252, 252, 255); noStroke(); rect(0, 0, HALF, PANEL_H, 0, 0, 0, 0);

  fill(20, 30, 80); textSize(12); textStyle(BOLD); textAlign(CENTER, TOP);
  text('TIME DOMAIN', HALF / 2, 5);
  textStyle(NORMAL);

  const ox = PL, oy = PT + PH / 2;
  const yscale = (PH / 2) / 1.4;
  const tmax = 4 / f1;
  const xscale = PW / tmax;

  // Grid
  stroke(210, 215, 230); strokeWeight(1);
  line(ox, oy - 1.0 * yscale, ox + PW, oy - 1.0 * yscale);
  line(ox, oy, ox + PW, oy);
  line(ox, oy + 1.0 * yscale, ox + PW, oy + 1.0 * yscale);

  // Axes
  stroke(100, 110, 150); strokeWeight(1.5);
  line(ox, PT, ox, PT + PH);
  line(ox, oy, ox + PW, oy);

  // Labels
  fill(80, 90, 130); noStroke(); textSize(9); textAlign(RIGHT, CENTER);
  text('+1', ox - 3, oy - 1.0 * yscale);
  text('0',  ox - 3, oy);
  text('-1', ox - 3, oy + 1.0 * yscale);
  textAlign(CENTER, TOP); textSize(9);
  text('Time (ms)', ox + PW / 2, PT + PH + 4);

  // Waveform
  stroke(40, 80, 200); strokeWeight(2); noFill();
  beginShape();
  for (let px = 0; px <= PW; px++) {
    const t = (px / PW) * tmax;
    const v = signal(t);
    vertex(ox + px, oy - v * yscale);
  }
  endShape();

  // Stage label bottom left
  noStroke(); fill(100, 110, 160); textSize(10); textAlign(LEFT, BOTTOM);
  text('Stage ' + stage + ': ' + STAGE_NAMES[stage], PL, PANEL_H - 4);
  text('→ shows SHAPE & TIMING', PL, PANEL_H - 4 - 13);
}

function drawFreqDomain() {
  const ox0 = HALF;
  fill(248, 252, 248); noStroke(); rect(ox0, 0, HALF, PANEL_H, 0, 0, 0, 0);

  fill(20, 80, 30); textSize(12); textStyle(BOLD); textAlign(CENTER, TOP);
  text('FREQUENCY DOMAIN', ox0 + HALF / 2, 5);
  textStyle(NORMAL);

  const ox = ox0 + PL;
  const oy = PT + PH;
  const fmax = (stage <= 3 ? 6 : numHarmonics * 2 + 1) * f1 + f1;
  const xscale = PW / fmax;
  const yscale = (PH * 0.85) / 1.1;

  // Grid & axes
  stroke(210, 220, 210); strokeWeight(1);
  for (let a = 0; a <= 1; a += 0.25) {
    line(ox, oy - a * yscale, ox + PW, oy - a * yscale);
  }
  stroke(80, 120, 80); strokeWeight(1.5);
  line(ox, PT, ox, oy);
  line(ox, oy, ox + PW, oy);

  // Labels
  fill(60, 100, 60); noStroke(); textSize(9); textAlign(RIGHT, CENTER);
  for (let a = 0; a <= 1.0; a += 0.5) {
    text(a.toFixed(1), ox - 3, oy - a * yscale);
  }
  textAlign(CENTER, TOP); text('Frequency (Hz)', ox + PW / 2, oy + 4);
  textAlign(CENTER, BOTTOM); text('Amplitude', ox - 25, PT + PH / 2);

  // Spectral lines
  const lines = spectrum();
  for (const line_ of lines) {
    const x = ox + line_.f * xscale;
    const h = line_.a * yscale;
    const c = line_.col;
    stroke(c[0], c[1], c[2]); strokeWeight(4);
    line(x, oy, x, oy - h);
    fill(c[0], c[1], c[2]); noStroke(); circle(x, oy - h, 8);
    // Frequency label
    textSize(9); textAlign(CENTER, BOTTOM);
    text(line_.f + 'Hz', x, oy - h - 3);
  }

  noStroke(); fill(60, 100, 60); textSize(10); textAlign(LEFT, BOTTOM);
  text('→ shows FREQUENCY CONTENT', ox, PANEL_H - 4);
}

function drawControls() {
  fill(218, 224, 240); noStroke(); rect(0, PANEL_H, CW, CTRL_H, 0, 0, 8, 8);

  drawBtn(PREV_B, '◀ Prev', stage > 1 ? [70, 90, 175] : [160, 165, 190]);
  // Stage info
  noStroke(); fill(25, 35, 100); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
  text('Stage ' + stage + '/' + NSTAGE + ': ' + STAGE_NAMES[stage], 140, BY + 13);
  textStyle(NORMAL);
  drawBtn(NEXT_B, 'Next ▶', stage < NSTAGE ? [70, 90, 175] : [160, 165, 190]);
  drawBtn(RST_B,  '↺ Reset', [100, 105, 135]);

  drawSlider('Frequency f₁:', f1, 1, 20, SL_Y1, f1.toFixed(0) + ' Hz');
  if (stage === 4) {
    drawSlider('Harmonics:', numHarmonics, 1, 10, SL_Y2, numHarmonics.toString());
  } else {
    noStroke(); fill(140, 150, 170); textSize(11); textAlign(RIGHT, CENTER);
    text('Harmonics: (stage 4 only)', SL_X - 8, SL_Y2);
  }

  // Insight text
  const insights = [
    '',
    'Single sinusoid → single spectral spike',
    'Two sinusoids → two spectral spikes',
    'Three sinusoids → three spikes, complex wave shape',
    'Square wave = infinite odd harmonics — more terms = sharper edges',
  ];
  noStroke(); fill(30, 50, 120); textSize(10); textStyle(ITALIC);
  textAlign(LEFT, CENTER);
  text(insights[stage], 10, PANEL_H + 118);
  textStyle(NORMAL);
}

function drawSlider(label, val, mn, mx, cy, dispVal) {
  const t  = (val - mn) / (mx - mn);
  const tx = SL_X + SL_W * t;
  noStroke(); fill(35, 45, 100); textSize(11); textAlign(RIGHT, CENTER);
  text(label + '  ' + dispVal, SL_X - 8, cy);
  fill(178, 183, 210); noStroke(); rect(SL_X, cy - 4, SL_W, 8, 4);
  fill(70, 110, 200); rect(SL_X, cy - 4, SL_W * t, 8, 4);
  fill(255); stroke(75, 110, 200); strokeWeight(2); circle(tx, cy, 18);
}

function drawBtn(b, lbl, col) {
  fill(col[0], col[1], col[2]); noStroke(); rect(b.x, b.y, b.w, b.h, 5);
  fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
  text(lbl, b.x + b.w / 2, b.y + b.h / 2); textStyle(NORMAL);
}

let dragSlider = null;
const SLIDERS = [
  { key: 'f1',   cy: SL_Y1, mn: 1,  mx: 20 },
  { key: 'harm', cy: SL_Y2, mn: 1,  mx: 10 },
];

function mousePressed() {
  if (inBtn(PREV_B) && stage > 1)      { stage--; return; }
  if (inBtn(NEXT_B) && stage < NSTAGE) { stage++; return; }
  if (inBtn(RST_B))  { stage = 1; f1 = 5; numHarmonics = 7; return; }
  startSliderDrag();
}
function mouseDragged() { if (dragSlider) applySliderDrag(); }
function mouseReleased() { dragSlider = null; }

function inBtn(b) {
  return mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
}
function startSliderDrag() {
  for (const s of SLIDERS) {
    if (mouseX >= SL_X - 12 && mouseX <= SL_X + SL_W + 12 &&
        mouseY >= s.cy - 14 && mouseY <= s.cy + 14) {
      dragSlider = s.key; applySliderDrag(); return;
    }
  }
}
function applySliderDrag() {
  const s = SLIDERS.find(d => d.key === dragSlider);
  if (!s) return;
  const t = constrain((mouseX - SL_X) / SL_W, 0, 1);
  const raw = s.mn + t * (s.mx - s.mn);
  if (s.key === 'f1')   f1           = constrain(round(raw), s.mn, s.mx);
  if (s.key === 'harm') numHarmonics = constrain(round(raw), s.mn, s.mx);
}
</script>
</body>
</html>
