<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DC and AC Component Separator</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
<style>
  body { margin: 0; padding: 0; background: #e8eaf0; }
  canvas { display: block; }
</style>
</head>
<body>
<main></main>
<script>
// DC and AC Component Separator
// Chapter 8: AC Signals and Sinusoidal Waveforms

const CW = 680;
const PLOT_H = 360;  // 3 plots × 120px
const CTRL_H = 130;
const CH = PLOT_H + CTRL_H;

const SUB_H = 110;  // height of each sub-plot
const PL = 60, PR = 20;
const PW = CW - PL - PR;
const PLOT_INNER_H = 80;

// Colors for each panel
const COL_COMPOSITE = [50, 100, 210];
const COL_DC        = [180, 50, 50];
const COL_AC        = [30, 150, 80];

// Slider layout
const SL_X = 220;
const SL_W = CW - SL_X - 20;
const SL_Y1 = PLOT_H + 30;
const SL_Y2 = PLOT_H + 58;
const SL_Y3 = PLOT_H + 86;
const BTN_RST = { x: 10, y: PLOT_H + 112, w: 80, h: 24 };

let Vdc = 2.5;
let Vm  = 2.0;
let f   = 5;
let dragSlider = null;

function setup() {
  createCanvas(CW, CH).parent(select('main').elt);
  textFont('Arial');
}

function draw() {
  background(232, 234, 240);
  drawPanel(0,   'Composite Signal:  v(t) = V_DC + Vm·sin(ωt)', COL_COMPOSITE, t => Vdc + Vm * sin(TWO_PI * f * t));
  drawPanel(SUB_H * 1, 'DC Component:  V_DC (constant)', COL_DC, t => Vdc);
  drawPanel(SUB_H * 2, 'AC Component:  Vm·sin(ωt)', COL_AC, t => Vm * sin(TWO_PI * f * t));
  drawControls();
}

function drawPanel(yOff, title, col, fn) {
  // Background
  fill(252, 252, 255); noStroke();
  rect(0, yOff, CW, SUB_H);

  // Title bar
  fill(col[0] * 0.2 + 200, col[1] * 0.2 + 200, col[2] * 0.2 + 200); noStroke();
  rect(0, yOff, CW, 20);
  fill(30, 40, 90); textSize(11); textStyle(BOLD); textAlign(LEFT, CENTER);
  text(title, PL, yOff + 10);
  textStyle(NORMAL);

  const ox = PL;
  const oy = yOff + 20 + PLOT_INNER_H / 2 + 10;
  const yscale = (PLOT_INNER_H / 2) / 6;
  const T = 1 / f;
  const xscale = PW / 4;

  // Grid
  stroke(210, 215, 230); strokeWeight(1);
  line(ox, oy - 5 * yscale, ox + PW, oy - 5 * yscale);
  line(ox, oy,               ox + PW, oy);
  line(ox, oy + 5 * yscale, ox + PW, oy + 5 * yscale);

  // Axes
  stroke(120, 130, 160); strokeWeight(1.5);
  line(ox, yOff + 20, ox, yOff + SUB_H - 5);
  line(ox, oy, ox + PW, oy);

  // Y labels
  fill(80, 90, 130); noStroke(); textSize(9); textAlign(RIGHT, CENTER);
  text('5V', ox - 3, oy - 5 * yscale);
  text('0V', ox - 3, oy);
  text('-5V', ox - 3, oy + 5 * yscale);

  // Waveform
  stroke(col[0], col[1], col[2]); strokeWeight(2); noFill();
  beginShape();
  for (let px = 0; px <= PW; px++) {
    const t = (px / PW) * (4 / f);
    const v = fn(t);
    vertex(ox + px, oy - v * yscale);
  }
  endShape();

  // Value labels
  noStroke();
  if (title.startsWith('DC')) {
    fill(col[0], col[1], col[2]); textSize(10); textAlign(LEFT, CENTER);
    text('V_DC = ' + Vdc.toFixed(2) + 'V', ox + PW * 0.7, oy - Vdc * yscale - 10);
    setLineDash([5, 4]);
    stroke(col[0], col[1], col[2]); strokeWeight(1.5);
    line(ox + PW * 0.65, oy - Vdc * yscale, ox + PW, oy - Vdc * yscale);
    setLineDash([]);
  }
  if (title.startsWith('AC')) {
    noStroke(); fill(col[0], col[1], col[2]); textSize(10); textAlign(LEFT, TOP);
    text('Vm = ' + Vm.toFixed(2) + 'V', ox + 4, yOff + 22);
    text('RMS = ' + (Vm / Math.SQRT2).toFixed(2) + 'V', ox + 4, yOff + 34);
  }
  if (title.startsWith('Composite')) {
    noStroke(); fill(col[0], col[1], col[2]); textSize(10); textAlign(LEFT, TOP);
    const peak = Vdc + Vm;
    const trough = Vdc - Vm;
    text('Peak = ' + peak.toFixed(2) + 'V', ox + 4, yOff + 22);
    text('Trough = ' + trough.toFixed(2) + 'V', ox + 4, yOff + 34);
  }
}

function setLineDash(list) { drawingContext.setLineDash(list); }

function drawControls() {
  fill(218, 224, 240); noStroke();
  rect(0, PLOT_H, CW, CTRL_H, 0, 0, 8, 8);

  drawSlider('DC Offset V_DC:', Vdc, 0, 5, SL_Y1, Vdc.toFixed(2) + ' V');
  drawSlider('AC Amplitude Vm:', Vm, 0, 5, SL_Y2, Vm.toFixed(2) + ' V');
  drawSlider('Frequency f:', f, 1, 20, SL_Y3, f.toFixed(0) + ' Hz');
  drawBtn(BTN_RST, '↺ Reset', [100, 105, 135]);

  // Formula display
  noStroke(); fill(30, 50, 120); textSize(11); textStyle(BOLD);
  textAlign(LEFT, CENTER);
  text(`v(t) = ${Vdc.toFixed(2)} + ${Vm.toFixed(2)}·sin(2π·${f}·t)`, 100, PLOT_H + 114);
  textStyle(NORMAL);
}

function drawSlider(label, val, mn, mx, cy, dispVal) {
  const t  = (val - mn) / (mx - mn);
  const tx = SL_X + SL_W * t;
  noStroke(); fill(35, 45, 100); textSize(11); textAlign(RIGHT, CENTER);
  text(label + '  ' + dispVal, SL_X - 8, cy);
  fill(178, 183, 210); noStroke(); rect(SL_X, cy - 4, SL_W, 8, 4);
  fill(70, 110, 200); rect(SL_X, cy - 4, SL_W * t, 8, 4);
  fill(255); stroke(75, 110, 200); strokeWeight(2); circle(tx, cy, 18);
}

function drawBtn(b, lbl, col) {
  fill(col[0], col[1], col[2]); noStroke(); rect(b.x, b.y, b.w, b.h, 5);
  fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
  text(lbl, b.x + b.w / 2, b.y + b.h / 2); textStyle(NORMAL);
}

const SLIDERS = [
  { key: 'vdc', cy: SL_Y1, mn: 0, mx: 5  },
  { key: 'vm',  cy: SL_Y2, mn: 0, mx: 5  },
  { key: 'f',   cy: SL_Y3, mn: 1, mx: 20 },
];

function mousePressed() {
  if (inBtn(BTN_RST)) { Vdc = 2.5; Vm = 2.0; f = 5; return; }
  startSliderDrag();
}
function mouseDragged() { if (dragSlider) applySliderDrag(); }
function mouseReleased() { dragSlider = null; }

function inBtn(b) {
  return mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
}
function startSliderDrag() {
  for (const s of SLIDERS) {
    if (mouseX >= SL_X - 12 && mouseX <= SL_X + SL_W + 12 &&
        mouseY >= s.cy - 14 && mouseY <= s.cy + 14) {
      dragSlider = s.key; applySliderDrag(); return;
    }
  }
}
function applySliderDrag() {
  const s = SLIDERS.find(d => d.key === dragSlider);
  if (!s) return;
  const t = constrain((mouseX - SL_X) / SL_W, 0, 1);
  const raw = s.mn + t * (s.mx - s.mn);
  if (s.key === 'vdc') Vdc = constrain(round(raw * 100) / 100, s.mn, s.mx);
  if (s.key === 'vm')  Vm  = constrain(round(raw * 100) / 100, s.mn, s.mx);
  if (s.key === 'f')   f   = constrain(round(raw), s.mn, s.mx);
}
</script>
</body>
</html>
