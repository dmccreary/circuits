<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gain and Decibel Converter</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
<style>
  body { margin: 0; padding: 0; background: #e8eaf0; }
  canvas { display: block; }
</style>
</head>
<body>
<main></main>
<script>
// Gain and Decibel Converter
// Chapter 8: AC Signals and Sinusoidal Waveforms

const CW = 680;
const VIZ_H = 230;  // signal visualization area
const CTRL_H = 170;
const CH = VIZ_H + CTRL_H;

let gainLinear = 10;  // linear voltage gain
let mode = 'voltage';  // 'voltage' or 'power'

// Slider: logarithmic gain slider
const SL_X = 240, SL_W = CW - 240 - 20;
const SL_Y1 = VIZ_H + 38;
const BTN_V  = { x: 10,  y: VIZ_H + 68, w: 120, h: 26 };
const BTN_P  = { x: 140, y: VIZ_H + 68, w: 120, h: 26 };
const BTN_RST = { x: 270, y: VIZ_H + 68, w: 80, h: 26 };

// Quick-set buttons
const QS = [
  { label: '÷10', g: 0.1  },
  { label: '÷2',  g: 0.5  },
  { label: '×1',  g: 1.0  },
  { label: '×2',  g: 2.0  },
  { label: '×10', g: 10   },
  { label: '×100',g: 100  },
];

const QS_Y = VIZ_H + 106;
const QS_W = 65, QS_H = 24;

let dragSlider = null;

function gainToDb() {
  if (mode === 'voltage') return 20 * Math.log10(gainLinear);
  else                    return 10 * Math.log10(gainLinear);
}

function dbStr() {
  const db = gainToDb();
  const sign = db >= 0 ? '+' : '';
  return sign + db.toFixed(2) + ' dB';
}

function setup() {
  createCanvas(CW, CH).parent(select('main').elt);
  textFont('Arial');
}

function draw() {
  background(232, 234, 240);
  drawVisualization();
  drawControls();
}

function drawVisualization() {
  fill(252, 252, 255); noStroke(); rect(0, 0, CW, VIZ_H);

  fill(20, 30, 80); textSize(13); textStyle(BOLD); textAlign(CENTER, TOP);
  text('Gain & Decibel Converter', CW / 2, 6);
  textStyle(NORMAL);

  const db = gainToDb();

  // Left panel: signal comparison
  drawSignalComparison();

  // Right panel: dB scale
  drawDbScale(db);

  // Center: conversion box
  drawConversionBox(db);
}

function drawSignalComparison() {
  const px = 30, py = 40, pw = 180, ph = 160;
  fill(240, 242, 255); noStroke(); rect(px, py, pw, ph, 5);
  fill(30, 40, 100); textSize(11); textStyle(BOLD); textAlign(CENTER, TOP);
  text('Signal Comparison', px + pw / 2, py + 4);
  textStyle(NORMAL);

  // Input signal bar
  const barY = py + 28;
  const barH_in = 50;
  const barX_in = px + 30;
  fill(180, 190, 230); noStroke(); rect(barX_in, barY, 20, barH_in, 3);
  // Arrow
  fill(60, 80, 160); noStroke(); textSize(9); textAlign(CENTER, BOTTOM);
  text('Input', barX_in + 10, barY - 2);
  noStroke(); fill(60, 80, 160); textSize(10);
  textAlign(CENTER, TOP); text('Vin', barX_in + 10, barY + barH_in + 2);

  // Output signal bar (scaled)
  const maxBarH = 130;
  const barH_out = constrain(barH_in * gainLinear, 2, maxBarH);
  const barX_out = px + 110;
  const barY_out = barY + barH_in - barH_out;  // bottom-aligned
  const c = gainLinear >= 1 ? [50, 150, 60] : [180, 70, 70];
  fill(c[0], c[1], c[2]); noStroke();
  rect(barX_out, max(barY_out, barY - 80), 20, min(barH_out, maxBarH), 3);
  fill(c[0], c[1], c[2]); textSize(9); textAlign(CENTER, BOTTOM);
  text('Output', barX_out + 10, barY - 2);
  textAlign(CENTER, TOP); text('Vout', barX_out + 10, barY + barH_in + 2);

  // Baseline
  stroke(150, 155, 190); strokeWeight(1);
  line(px + 10, barY + barH_in, px + pw - 10, barY + barH_in);

  // Gain label
  noStroke(); fill(30, 40, 100); textSize(10); textStyle(BOLD);
  textAlign(CENTER, BOTTOM);
  const gStr = gainLinear >= 100 ? gainLinear.toFixed(0) :
               gainLinear >= 10  ? gainLinear.toFixed(1) :
               gainLinear >= 1   ? gainLinear.toFixed(2) : gainLinear.toFixed(3);
  text('A = ' + gStr, px + pw / 2, py + ph - 4);
  textStyle(NORMAL);
}

function drawDbScale(db) {
  const sx = CW - 150, sy = 38, sw = 120, sh = 170;
  fill(240, 255, 242); noStroke(); rect(sx, sy, sw, sh, 5);
  fill(0, 100, 40); textSize(11); textStyle(BOLD); textAlign(CENTER, TOP);
  text('dB Scale', sx + sw / 2, sy + 4);
  textStyle(NORMAL);

  // Scale from -40 to +60 dB
  const dbMin = -40, dbMax = 60;
  const scaleH = sh - 40;
  const scaleX = sx + 55;
  const scaleY_top = sy + 22;

  // Scale bar background
  fill(210, 230, 215); noStroke(); rect(scaleX, scaleY_top, 18, scaleH, 3);
  // Gradient fill from bottom to current level
  const dbClamped = constrain(db, dbMin, dbMax);
  const frac = (dbClamped - dbMin) / (dbMax - dbMin);
  const barH = frac * scaleH;
  const barCol = db >= 0 ? [50, 150, 60] : [180, 70, 70];
  fill(barCol[0], barCol[1], barCol[2]); noStroke();
  rect(scaleX, scaleY_top + scaleH - barH, 18, barH, 0, 0, 3, 3);

  // Tick marks
  fill(50, 80, 60); textSize(8); textAlign(RIGHT, CENTER);
  for (let d = dbMin; d <= dbMax; d += 20) {
    const ty = scaleY_top + scaleH - (d - dbMin) / (dbMax - dbMin) * scaleH;
    stroke(100, 140, 110); strokeWeight(1); line(scaleX - 3, ty, scaleX, ty);
    noStroke(); text(d + 'dB', scaleX - 5, ty);
  }

  // Current marker
  const markerY = scaleY_top + scaleH - frac * scaleH;
  fill(200, 0, 0); noStroke();
  triangle(scaleX + 18, markerY, scaleX + 32, markerY - 6, scaleX + 32, markerY + 6);
  textSize(9); textStyle(BOLD); textAlign(LEFT, CENTER);
  fill(180, 0, 0); text(dbStr(), scaleX + 35, markerY);
  textStyle(NORMAL);
}

function drawConversionBox(db) {
  const bx = 230, by = 35, bw = CW - 230 - 160, bh = 180;
  fill(245, 248, 255); noStroke(); rect(bx, by, bw, bh, 5);
  fill(20, 30, 80); textSize(11); textStyle(BOLD); textAlign(CENTER, TOP);
  text('Conversion Formulas', bx + bw / 2, by + 5);
  textStyle(NORMAL);

  const gStr = gainLinear >= 100 ? gainLinear.toFixed(1) :
               gainLinear >= 1   ? gainLinear.toFixed(3) : gainLinear.toFixed(4);
  const dbVal = db.toFixed(3);

  let y = by + 22;
  const lx = bx + 10;

  if (mode === 'voltage') {
    fill(30, 60, 160); textSize(11); textAlign(LEFT, TOP);
    text('Voltage Gain → dB:', lx, y); y += 14;
    fill(50, 80, 200); textSize(12); textStyle(BOLD);
    text(`dB = 20 · log₁₀(${gStr}) = ${dbVal} dB`, lx + 8, y); y += 18;
    textStyle(NORMAL);

    fill(30, 60, 160); textSize(11);
    text('dB → Voltage Gain:', lx, y); y += 14;
    fill(50, 80, 200); textSize(12); textStyle(BOLD);
    text(`A = 10^(${dbVal}/20) = ${gStr}`, lx + 8, y); y += 20;
    textStyle(NORMAL);
  } else {
    fill(130, 60, 0); textSize(11); textAlign(LEFT, TOP);
    text('Power Gain → dB:', lx, y); y += 14;
    fill(160, 80, 0); textSize(12); textStyle(BOLD);
    text(`dB = 10 · log₁₀(${gStr}) = ${dbVal} dB`, lx + 8, y); y += 18;
    textStyle(NORMAL);
    fill(130, 60, 0); textSize(11);
    text('dB → Power Gain:', lx, y); y += 14;
    fill(160, 80, 0); textSize(12); textStyle(BOLD);
    text(`A = 10^(${dbVal}/10) = ${gStr}`, lx + 8, y); y += 20;
    textStyle(NORMAL);
  }

  // Quick reference
  const refs = mode === 'voltage'
    ? ['×2 = +6.02 dB', '×10 = +20 dB', '×0.5 = -6.02 dB', '×0.1 = -20 dB']
    : ['×2 = +3.01 dB', '×10 = +10 dB', '×0.5 = -3.01 dB', '×0.1 = -10 dB'];
  fill(100, 110, 160); textSize(9); textAlign(LEFT, TOP);
  refs.forEach((r, i) => text(r, lx + (i % 2) * (bw / 2 - 10), y + floor(i / 2) * 12));
}

function drawControls() {
  fill(218, 224, 240); noStroke(); rect(0, VIZ_H, CW, CTRL_H, 0, 0, 8, 8);

  // Gain slider (logarithmic: 0.001 to 1000)
  const logMin = Math.log10(0.001), logMax = Math.log10(1000);
  const logVal = Math.log10(gainLinear);
  drawSlider('Gain A:', logVal, logMin, logMax, SL_Y1,
    gainLinear >= 10 ? gainLinear.toFixed(1) : gainLinear >= 1 ? gainLinear.toFixed(3) : gainLinear.toFixed(4));

  drawBtn(BTN_V,   mode === 'voltage' ? '● Voltage Gain' : '○ Voltage Gain', mode === 'voltage' ? [50, 100, 200] : [110, 130, 180]);
  drawBtn(BTN_P,   mode === 'power'   ? '● Power Gain'   : '○ Power Gain',   mode === 'power'   ? [160, 80, 0]   : [110, 130, 180]);
  drawBtn(BTN_RST, '↺ Reset', [100, 105, 135]);

  // Quick-set buttons
  QS.forEach((q, i) => {
    const bx = 10 + i * (QS_W + 8);
    const b = { x: bx, y: QS_Y, w: QS_W, h: QS_H };
    drawBtn(b, q.label, [70, 90, 170]);
  });
  noStroke(); fill(50, 60, 130); textSize(10); textAlign(LEFT, BOTTOM);
  text('Quick set:', 8, QS_Y - 2);
}

function drawSlider(label, val, mn, mx, cy, dispVal) {
  const t  = constrain((val - mn) / (mx - mn), 0, 1);
  const tx = SL_X + SL_W * t;
  noStroke(); fill(35, 45, 100); textSize(11); textAlign(RIGHT, CENTER);
  text(label + '  ' + dispVal, SL_X - 8, cy);
  fill(178, 183, 210); noStroke(); rect(SL_X, cy - 4, SL_W, 8, 4);
  fill(70, 110, 200); rect(SL_X, cy - 4, SL_W * t, 8, 4);
  fill(255); stroke(75, 110, 200); strokeWeight(2); circle(tx, cy, 18);
}

function drawBtn(b, lbl, col) {
  fill(col[0], col[1], col[2]); noStroke(); rect(b.x, b.y, b.w, b.h, 5);
  fill(255); textSize(11); textStyle(BOLD); textAlign(CENTER, CENTER);
  text(lbl, b.x + b.w / 2, b.y + b.h / 2); textStyle(NORMAL);
}

function mousePressed() {
  if (inBtn(BTN_V))   { mode = 'voltage'; return; }
  if (inBtn(BTN_P))   { mode = 'power'; return; }
  if (inBtn(BTN_RST)) { gainLinear = 10; mode = 'voltage'; return; }
  for (const q of QS) {
    const i = QS.indexOf(q);
    const b = { x: 10 + i * (QS_W + 8), y: QS_Y, w: QS_W, h: QS_H };
    if (inBtn(b)) { gainLinear = q.g; return; }
  }
  startSliderDrag();
}
function mouseDragged() { if (dragSlider) applySliderDrag(); }
function mouseReleased() { dragSlider = null; }

function inBtn(b) {
  return mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
}
function startSliderDrag() {
  if (mouseX >= SL_X - 12 && mouseX <= SL_X + SL_W + 12 &&
      mouseY >= SL_Y1 - 14 && mouseY <= SL_Y1 + 14) {
    dragSlider = 'gain'; applySliderDrag();
  }
}
function applySliderDrag() {
  const t = constrain((mouseX - SL_X) / SL_W, 0, 1);
  const logMin = Math.log10(0.001), logMax = Math.log10(1000);
  const logVal = logMin + t * (logMax - logMin);
  gainLinear = pow(10, logVal);
}
</script>
</body>
</html>
