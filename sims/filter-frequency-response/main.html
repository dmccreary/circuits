<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>RC Filter Frequency Response</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background: #fff;
        }
        .sim-container {
            max-width: 720px;
            margin: 0 auto;
        }
        h3 {
            text-align: center;
            margin: 0 0 8px;
            font-size: 1.1em;
            color: #222;
        }
        /* Filter type toggle buttons */
        .filter-toggle {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .filter-btn {
            padding: 5px 20px;
            border: 2px solid #1565C0;
            border-radius: 20px;
            background: white;
            color: #1565C0;
            cursor: pointer;
            font-size: 0.88em;
            font-weight: bold;
            transition: background 0.2s, color 0.2s;
        }
        .filter-btn.active {
            background: #1565C0;
            color: white;
        }
        /* Chart wrapper */
        .chart-wrapper {
            position: relative;
            height: 310px;
            margin-bottom: 8px;
        }
        /* Control panel */
        .controls {
            background: #f0f0f0;
            border-radius: 6px;
            padding: 10px 14px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            margin: 6px 0;
        }
        .slider-label {
            min-width: 170px;
            text-align: right;
            padding-right: 10px;
            font-size: 0.85em;
            color: #333;
            font-family: 'Courier New', monospace;
        }
        .slider-row input[type=range] {
            flex: 1;
            accent-color: #1565C0;
            cursor: pointer;
        }
        /* Info bar: fc display + sweep readout */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .fc-label {
            font-size: 0.95em;
            font-weight: bold;
            color: #222;
        }
        .fc-value {
            color: #1565C0;
        }
        .sweep-readout {
            font-size: 0.82em;
            color: #555;
            font-family: 'Courier New', monospace;
        }
        /* Action buttons */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .action-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
        }
        .btn-sweep { background: #43A047; color: white; }
        .btn-sweep.running { background: #E53935; }
        .btn-reset { background: #78909C; color: white; }
    </style>
</head>
<body>
<div class="sim-container">
    <h3>RC Filter Frequency Response (Bode Plot)</h3>

    <div class="filter-toggle">
        <button class="filter-btn active" id="lpBtn" onclick="setFilter('lowpass')">Low-Pass</button>
        <button class="filter-btn" id="hpBtn" onclick="setFilter('highpass')">High-Pass</button>
    </div>

    <div class="chart-wrapper">
        <canvas id="bodeChart"></canvas>
    </div>

    <div class="controls">
        <div class="slider-row">
            <span class="slider-label" id="rLabel">R: 1.00 k&#937;</span>
            <input type="range" id="rSlider" min="0" max="100" value="33" oninput="updateParams()">
        </div>
        <div class="slider-row">
            <span class="slider-label" id="cLabel">C: 100 nF</span>
            <input type="range" id="cSlider" min="0" max="100" value="50" oninput="updateParams()">
        </div>
        <div class="info-bar">
            <div class="fc-label">f<sub>c</sub> = <span class="fc-value" id="fcDisplay">---</span></div>
            <div class="sweep-readout" id="sweepReadout">Press &#9654; Start Sweep to animate</div>
        </div>
        <div class="btn-row">
            <button class="action-btn btn-sweep" id="sweepBtn" onclick="toggleSweep()">&#9654; Start Sweep</button>
            <button class="action-btn btn-reset" onclick="resetSim()">&#8635; Reset</button>
        </div>
    </div>
</div>

<script>
// =====================================================
// Constants
// =====================================================
const FREQ_MIN = 1;       // 1 Hz  (plot left edge)
const FREQ_MAX = 1e7;     // 10 MHz (plot right edge)
const N_POINTS = 200;     // number of data points on the curve

// Resistance range: 100 Ω – 100 kΩ (3 decades)
const R_MIN = 100;
const R_MAX = 1e5;

// Capacitance range: 1 nF – 10 μF (4 decades)
const C_MIN = 1e-9;
const C_MAX = 1e-5;

const SWEEP_SPEED = 0.003; // log-fraction of the x-axis advanced per frame

// =====================================================
// State
// =====================================================
let filterType = 'lowpass';
let R = 1000;   // Ohms  (initial: 1 kΩ)
let C = 1e-7;   // Farads (initial: 100 nF)
let fc = 0;     // Cutoff frequency, computed from R and C

let isAnimating = false;
let sweepLogPos = 0;   // 0.0 → 1.0 (position in log-frequency space)
let sweepFreq = null;  // current sweep frequency, null when hidden
let animId = null;

// =====================================================
// Pre-computed frequency array (log-spaced)
// =====================================================
const FREQUENCIES = (function () {
    const arr = [];
    for (let i = 0; i < N_POINTS; i++) {
        arr.push(FREQ_MIN * Math.pow(FREQ_MAX / FREQ_MIN, i / (N_POINTS - 1)));
    }
    return arr;
})();

// =====================================================
// Math helpers
// =====================================================

/** Map a slider value (0–100) to a logarithmic range [minVal, maxVal]. */
function sliderToLog(val, minVal, maxVal) {
    return minVal * Math.pow(maxVal / minVal, val / 100);
}

/** RC filter magnitude in dB at frequency f, given cutoff fc. */
function getMagnitudeDB(f, cutoff, type) {
    const ratio = f / cutoff;
    if (type === 'lowpass') {
        return 20 * Math.log10(1 / Math.sqrt(1 + ratio * ratio));
    } else {
        return 20 * Math.log10(ratio / Math.sqrt(1 + ratio * ratio));
    }
}

/** Compute cutoff frequency from R (Ω) and C (F). */
function computeFC(r, c) {
    return 1 / (2 * Math.PI * r * c);
}

// =====================================================
// Formatting helpers
// =====================================================
function formatR(r) {
    if (r >= 1e5) return (r / 1000).toFixed(0) + ' k\u03A9';
    if (r >= 1e4) return (r / 1000).toFixed(1) + ' k\u03A9';
    if (r >= 1e3) return (r / 1000).toFixed(2) + ' k\u03A9';
    return Math.round(r) + ' \u03A9';
}

function formatC(c) {
    if (c >= 1e-3) return (c * 1e3).toFixed(1) + ' mF';
    if (c >= 100e-6) return (c * 1e6).toFixed(0) + ' \u03BCF';
    if (c >= 10e-6)  return (c * 1e6).toFixed(1) + ' \u03BCF';
    if (c >= 1e-6)   return (c * 1e6).toFixed(2) + ' \u03BCF';
    if (c >= 100e-9) return (c * 1e9).toFixed(0) + ' nF';
    if (c >= 10e-9)  return (c * 1e9).toFixed(1) + ' nF';
    return (c * 1e9).toFixed(2) + ' nF';
}

function formatFreq(f) {
    if (f >= 1e6) return (f / 1e6).toFixed(f >= 10e6 ? 0 : 2) + ' MHz';
    if (f >= 1e3) return (f / 1e3).toFixed(f >= 10e3 ? 1 : 2) + ' kHz';
    if (f >= 10)  return f.toFixed(0) + ' Hz';
    return f.toFixed(1) + ' Hz';
}

// =====================================================
// Sweep cursor — drawn directly on the Chart.js canvas
// via a local plugin using the afterDraw hook.
// =====================================================
const sweepCursorPlugin = {
    id: 'sweepCursor',
    afterDraw(chart) {
        if (sweepFreq === null) return;

        const ctx = chart.ctx;
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;

        const x  = xScale.getPixelForValue(sweepFreq);
        const db = getMagnitudeDB(sweepFreq, fc, filterType);
        const y  = yScale.getPixelForValue(db);

        ctx.save();

        // Orange dashed vertical line
        ctx.beginPath();
        ctx.moveTo(x, yScale.top);
        ctx.lineTo(x, yScale.bottom);
        ctx.strokeStyle = 'rgba(255, 100, 0, 0.85)';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 3]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Dot at intersection with the response curve
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 100, 0, 0.95)';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.restore();
    }
};

// =====================================================
// Chart.js — Bode plot
// =====================================================
const chartCtx = document.getElementById('bodeChart').getContext('2d');

const chart = new Chart(chartCtx, {
    type: 'line',
    plugins: [sweepCursorPlugin],   // register plugin locally
    data: {
        datasets: [
            {
                // Dataset 0: main frequency response curve
                label: 'Low-Pass Gain',
                data: [],
                borderColor: '#1565C0',
                backgroundColor: 'rgba(21, 101, 192, 0.08)',
                borderWidth: 2.5,
                pointRadius: 0,
                fill: true,
                tension: 0
            },
            {
                // Dataset 1: -3 dB reference line (horizontal)
                label: '\u22123 dB',
                data: [
                    { x: FREQ_MIN, y: -3 },
                    { x: FREQ_MAX, y: -3 }
                ],
                borderColor: 'rgba(120, 120, 120, 0.65)',
                borderWidth: 1.5,
                borderDash: [4, 4],
                pointRadius: 0,
                fill: false,
                tension: 0
            },
            {
                // Dataset 2: fc vertical marker (will be updated in updateChart)
                label: 'f\u2093',
                data: [],
                borderColor: 'rgba(21, 101, 192, 0.5)',
                borderWidth: 1.5,
                borderDash: [8, 4],
                pointRadius: 0,
                fill: false,
                tension: 0
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 0 },   // no animation — updates must be instant
        scales: {
            x: {
                type: 'logarithmic',
                min: FREQ_MIN,
                max: FREQ_MAX,
                title: {
                    display: true,
                    text: 'Frequency (Hz)',
                    font: { size: 11 }
                },
                ticks: {
                    callback: function (value) {
                        // Only label decade values (powers of 10)
                        const logVal = Math.log10(value);
                        if (Math.abs(logVal - Math.round(logVal)) < 0.01) {
                            return formatFreq(value);
                        }
                        return '';
                    },
                    maxRotation: 0,
                    font: { size: 10 }
                },
                grid: { color: 'rgba(0, 0, 0, 0.08)' }
            },
            y: {
                min: -65,
                max: 5,
                title: {
                    display: true,
                    text: 'Magnitude (dB)',
                    font: { size: 11 }
                },
                ticks: {
                    stepSize: 10,
                    callback: v => v + ' dB',
                    font: { size: 10 }
                },
                grid: { color: 'rgba(0, 0, 0, 0.08)' }
            }
        },
        plugins: {
            legend: {
                display: true,
                position: 'top',
                labels: { font: { size: 10 }, boxWidth: 18, padding: 12 }
            },
            tooltip: {
                callbacks: {
                    title: items => 'f = ' + formatFreq(items[0].parsed.x),
                    label: item => 'Gain = ' + item.parsed.y.toFixed(1) + ' dB'
                }
            }
        }
    }
});

// =====================================================
// Update chart data and UI from current R, C, filterType
// =====================================================
function updateChart() {
    const isLP = filterType === 'lowpass';
    const color = isLP ? '#1565C0' : '#B71C1C';
    const bgColor = isLP
        ? 'rgba(21, 101, 192, 0.08)'
        : 'rgba(183, 28, 28, 0.08)';

    // Dataset 0: response curve
    chart.data.datasets[0].label = isLP ? 'Low-Pass Gain' : 'High-Pass Gain';
    chart.data.datasets[0].borderColor = color;
    chart.data.datasets[0].backgroundColor = bgColor;
    chart.data.datasets[0].data = FREQUENCIES.map(f => ({
        x: f,
        y: getMagnitudeDB(f, fc, filterType)
    }));

    // Dataset 2: fc vertical marker
    chart.data.datasets[2].data = [
        { x: fc, y: -65 },
        { x: fc, y: 5 }
    ];
    chart.data.datasets[2].borderColor = color + '88';
    chart.data.datasets[2].label = 'f\u2093 = ' + formatFreq(fc);

    chart.update('none');
}

// =====================================================
// Read sliders, recompute R/C/fc, refresh display
// =====================================================
function updateParams() {
    R  = sliderToLog(parseFloat(document.getElementById('rSlider').value), R_MIN, R_MAX);
    C  = sliderToLog(parseFloat(document.getElementById('cSlider').value), C_MIN, C_MAX);
    fc = computeFC(R, C);

    document.getElementById('rLabel').textContent   = 'R: ' + formatR(R);
    document.getElementById('cLabel').textContent   = 'C: ' + formatC(C);
    document.getElementById('fcDisplay').textContent = formatFreq(fc);

    updateChart();
}

// =====================================================
// Filter type toggle
// =====================================================
function setFilter(type) {
    filterType = type;
    document.getElementById('lpBtn').classList.toggle('active', type === 'lowpass');
    document.getElementById('hpBtn').classList.toggle('active', type === 'highpass');
    updateChart();
}

// =====================================================
// Frequency sweep animation
// =====================================================
function animateSweep() {
    if (!isAnimating) return;

    sweepLogPos += SWEEP_SPEED;
    if (sweepLogPos > 1) sweepLogPos = 0;   // loop

    sweepFreq = FREQ_MIN * Math.pow(FREQ_MAX / FREQ_MIN, sweepLogPos);
    const db  = getMagnitudeDB(sweepFreq, fc, filterType);

    document.getElementById('sweepReadout').textContent =
        'f = ' + formatFreq(sweepFreq) + '  |  Gain = ' + db.toFixed(1) + ' dB';

    chart.update('none');
    animId = requestAnimationFrame(animateSweep);
}

function toggleSweep() {
    isAnimating = !isAnimating;
    const btn = document.getElementById('sweepBtn');

    if (isAnimating) {
        btn.textContent = '\u23F9 Stop Sweep';
        btn.classList.add('running');
        animateSweep();
    } else {
        btn.textContent = '\u25B6 Start Sweep';
        btn.classList.remove('running');
        if (animId) { cancelAnimationFrame(animId); animId = null; }
        sweepFreq = null;
        sweepLogPos = 0;
        document.getElementById('sweepReadout').textContent = 'Press \u25B6 Start Sweep to animate';
        chart.update('none');
    }
}

// =====================================================
// Reset
// =====================================================
function resetSim() {
    if (isAnimating) toggleSweep();   // stop sweep first

    document.getElementById('rSlider').value = 33;
    document.getElementById('cSlider').value = 50;

    filterType = 'lowpass';
    document.getElementById('lpBtn').classList.add('active');
    document.getElementById('hpBtn').classList.remove('active');

    updateParams();
}

// =====================================================
// Initialize on load
// =====================================================
updateParams();
</script>
</body>
</html>
