<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3-Band Equalizer Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  body { margin: 0; background: #f0f0f0; display: flex; justify-content: center; }
</style>
</head>
<body>
<script>
const CW = 720, CH = 520;
const PX = 70, PY = 48, PW = 620, PH = 300;
const CTRL_Y = PY + PH + 30;
const SL_X = 220, SL_W = 440;

let bassGain = 0, midGain = 0, trebleGain = 0;
let dragging = -1; // 0=bass,1=mid,2=treble

function setup() {
  createCanvas(CW, CH);
  textFont('Arial');
}

function eqDb(f, b, m, t) {
  // Bass shelf fc=200Hz, treble shelf fc=4000Hz, mid peak fc=1000Hz Q=1.4
  let bShelf = b / (1 + pow(f / 200, 2));
  let tShelf = t * pow(f / 4000, 2) / (1 + pow(f / 4000, 2));
  let fmid = 1000, Q = 1.4;
  let ratio = f / fmid;
  let midPeak = m * (ratio / Q) / sqrt(pow(1 - ratio * ratio, 2) + pow(ratio / Q, 2));
  return bShelf + midPeak + tShelf;
}

function freqToX(f) {
  return PX + map(log(f) / log(10), log(20) / log(10), log(20000) / log(10), 0, PW);
}

function dbToY(db) {
  return PY + map(db, 15, -15, 0, PH);
}

function drawPlot() {
  // Background
  fill(255); stroke(220); strokeWeight(1);
  rect(PX, PY, PW, PH);

  // Horizontal grid (dB)
  let dbLines = [-12, -9, -6, -3, 0, 3, 6, 9, 12];
  textSize(10); textAlign(RIGHT, CENTER); noStroke();
  for (let db of dbLines) {
    let y = dbToY(db);
    stroke(db === 0 ? color(180) : color(235));
    strokeWeight(db === 0 ? 1.5 : 1);
    line(PX, y, PX + PW, y);
    noStroke(); fill(100);
    text(db + " dB", PX - 5, y);
  }

  // Vertical grid (frequency)
  let freqs = [20,50,100,200,500,1000,2000,5000,10000,20000];
  let labs  = ["20","50","100","200","500","1k","2k","5k","10k","20k"];
  textAlign(CENTER, TOP);
  for (let i = 0; i < freqs.length; i++) {
    let x = freqToX(freqs[i]);
    stroke(235); strokeWeight(1);
    line(x, PY, x, PY + PH);
    noStroke(); fill(100); textSize(10);
    text(labs[i], x, PY + PH + 4);
  }

  // Band color fills (subtle)
  noStroke();
  fill(255, 100, 100, 18);
  rect(PX, PY, freqToX(300) - PX, PH);          // bass
  fill(100, 200, 100, 18);
  rect(freqToX(300), PY, freqToX(3000) - freqToX(300), PH); // mid
  fill(100, 100, 255, 18);
  rect(freqToX(3000), PY, PX + PW - freqToX(3000), PH);     // treble

  // Band labels
  textSize(11); noStroke();
  fill(200, 80, 80, 160); textAlign(CENTER, TOP);
  text("BASS", freqToX(80), PY + 6);
  fill(60, 160, 60, 160);
  text("MID", freqToX(900), PY + 6);
  fill(60, 60, 220, 160);
  text("TREBLE", freqToX(9000), PY + 6);

  // 0 dB flat reference line
  stroke(180); strokeWeight(1); setLineDash([6, 4]);
  line(PX, dbToY(0), PX + PW, dbToY(0));
  setLineDash([]);

  // EQ curve
  stroke(90, 62, 237); strokeWeight(2.5); noFill();
  beginShape();
  for (let i = 0; i <= 400; i++) {
    let f = pow(10, map(i, 0, 400, log(20)/log(10), log(20000)/log(10)));
    let db = eqDb(f, bassGain, midGain, trebleGain);
    vertex(freqToX(f), constrain(dbToY(db), PY, PY + PH));
  }
  endShape();

  // Axis labels
  noStroke(); fill(50); textSize(12); textAlign(CENTER, TOP);
  text("Frequency (Hz)", PX + PW / 2, PY + PH + 22);
  push(); translate(16, PY + PH / 2); rotate(-HALF_PI);
  textAlign(CENTER, CENTER); text("Gain (dB)", 0, 0); pop();
}

function drawSlider(label, val, row) {
  let y = CTRL_Y + row * 48;
  let thumbX = SL_X + map(val, -12, 12, 0, SL_W);

  // Track
  fill(210); noStroke(); rect(SL_X, y - 3, SL_W, 6, 3);
  // Fill
  let mid = SL_X + SL_W / 2;
  if (val >= 0) { fill(90, 62, 237); rect(mid, y - 3, thumbX - mid, 6); }
  else          { fill(220, 80, 80);  rect(thumbX, y - 3, mid - thumbX, 6); }
  // Center tick
  stroke(150); strokeWeight(1.5); line(mid, y - 8, mid, y + 8);
  // Thumb
  fill(255); stroke(160); strokeWeight(1.5); circle(thumbX, y, 18);
  // Label
  noStroke(); fill(40); textSize(13); textAlign(RIGHT, CENTER);
  text(label, SL_X - 12, y);
  // Value badge
  let valStr = (val >= 0 ? "+" : "") + val.toFixed(0) + " dB";
  fill(val === 0 ? color(150) : (val > 0 ? color(90,62,237) : color(220,80,80)));
  textAlign(LEFT, CENTER); textSize(12);
  text(valStr, SL_X + SL_W + 10, y);
}

function draw() {
  background(240);

  // Title
  fill(30); noStroke(); textAlign(CENTER, TOP); textSize(16); textStyle(BOLD);
  text("3-Band Graphic Equalizer", CW / 2, 12);
  textStyle(NORMAL);

  drawPlot();

  // Controls area
  fill(248); stroke(210); strokeWeight(1);
  rect(0, CTRL_Y - 16, CW, CH - CTRL_Y + 16);

  drawSlider("Bass (100 Hz):", bassGain, 0);
  drawSlider("Mid  (1 kHz):",  midGain,  1);
  drawSlider("Treble (10 kHz):", trebleGain, 2);

  // Flat button
  let bx = CW - 80, by = CTRL_Y + 48;
  let hover = mouseX > bx - 30 && mouseX < bx + 30 && mouseY > by - 13 && mouseY < by + 13;
  fill(hover ? color(90,62,237) : color(240)); stroke(180); strokeWeight(1);
  rect(bx - 30, by - 13, 60, 26, 5);
  noStroke(); fill(hover ? 255 : 80); textSize(12); textAlign(CENTER, CENTER);
  text("Flat", bx, by);
}

function setLineDash(list) {
  drawingContext.setLineDash(list);
}

function sliderRowAt(y) {
  for (let i = 0; i < 3; i++) {
    if (abs(y - (CTRL_Y + i * 48)) < 16) return i;
  }
  return -1;
}

function mousePressed() {
  // Flat button
  let bx = CW - 80, by = CTRL_Y + 48;
  if (abs(mouseX - bx) < 30 && abs(mouseY - by) < 13) {
    bassGain = midGain = trebleGain = 0;
    return;
  }
  if (mouseX >= SL_X - 10 && mouseX <= SL_X + SL_W + 10) {
    dragging = sliderRowAt(mouseY);
  }
}

function mouseDragged() {
  if (dragging < 0) return;
  let val = constrain(map(mouseX, SL_X, SL_X + SL_W, -12, 12), -12, 12);
  val = round(val);
  if (dragging === 0) bassGain = val;
  else if (dragging === 1) midGain = val;
  else trebleGain = val;
}

function mouseReleased() { dragging = -1; }
</script>
</body>
</html>
