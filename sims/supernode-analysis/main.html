<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supernode Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
    <style>
        /* Do NOT use height:100% + overflow:hidden — that clips the canvas bottom */
        html {
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fa;
            /* Let body grow to fit canvas; no overflow clipping */
        }
        main {
            display: block;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="supernode-analysis.js"></script>
</head>
<body>
    <main></main>
    <script src="../../js/microsim-controls.js"></script>
</body>
</html>
